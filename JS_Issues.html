<script>
    // ==========================================
    // MODULE: ISSUES & INCIDENT MANAGEMENT
    // (แจ้งปัญหาคุณภาพและติดตามการแก้ไข)
    // วิสัยทัศน์: อนาคตสามารถนำข้อมูลนี้ไปแจ้งเตือนผ่าน Line Notify ได้ทันที
    // ==========================================

    var currentIssueFilter = 'All';

    function initIssuesView() {
        // อัปเดต Dropdown ลูกค้าในหน้าแจ้งปัญหา
        var issueClientSelect = document.getElementById('issueClient');
        if (issueClientSelect) { 
            issueClientSelect.innerHTML = '<option value="">-- เลือกไซต์งานที่เกิดปัญหา --</option>'; 
            MOCK_CLIENTS.forEach(function(c) { 
                if(c.type !== 'system') {
                    var opt = document.createElement('option'); 
                    opt.value = c.id; opt.text = c.name; 
                    issueClientSelect.appendChild(opt); 
                }
            });
            if (window.jQuery && $.fn.select2) $('#issueClient').select2({ width: '100%', dropdownParent: $('#issueModal') });
        }
        renderIssuesTable();
    }

    function filterIssues(status) {
        currentIssueFilter = status;
        
        // ปรับ UI ปุ่มกด
        var buttons = ['All', 'Pending', 'InProgress', 'Resolved'];
        buttons.forEach(function(btnPrefix) {
            var btn = document.getElementById('btnFilterIssue-' + btnPrefix);
            var badge = document.getElementById('countIssue' + btnPrefix);
            if(btn) {
                btn.className = "px-4 py-1.5 rounded-full text-[12px] font-bold bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 transition";
                if(badge) badge.className = "ml-1 px-1.5 bg-gray-100 rounded-full text-[10px]";
            }
        });

        var activeBtn = document.getElementById('btnFilterIssue-' + (status === 'In Progress' ? 'InProgress' : status));
        var activeBadge = document.getElementById('countIssue' + (status === 'In Progress' ? 'InProgress' : status));
        
        if(activeBtn) {
            activeBtn.className = "px-4 py-1.5 rounded-full text-[12px] font-bold bg-gray-800 text-white shadow-sm transition";
            if(activeBadge) activeBadge.className = "ml-1 px-1.5 bg-white/20 rounded-full text-[10px]";
        }

        renderIssuesTable();
    }

    function renderIssuesTable() {
        var tbody = document.getElementById('issuesTableBody');
        if (!tbody) return;

        // คำนวณ Badge Count
        var countAll = MOCK_ISSUES.length;
        var countPending = MOCK_ISSUES.filter(function(i) { return i.status === 'Pending'; }).length;
        var countProg = MOCK_ISSUES.filter(function(i) { return i.status === 'In Progress'; }).length;
        var countRes = MOCK_ISSUES.filter(function(i) { return i.status === 'Resolved'; }).length;

        var elAll = document.getElementById('countIssueAll'); if(elAll) elAll.innerText = countAll;
        var elPen = document.getElementById('countIssuePending'); if(elPen) elPen.innerText = countPending;
        var elProg = document.getElementById('countIssueInProgress'); if(elProg) elProg.innerText = countProg;
        var elRes = document.getElementById('countIssueResolved'); if(elRes) elRes.innerText = countRes;

        // กรองข้อมูล
        var displayIssues = MOCK_ISSUES;
        if (currentIssueFilter !== 'All') {
            displayIssues = MOCK_ISSUES.filter(function(i) { return i.status === currentIssueFilter; });
        }

        // เรียงจากใหม่ไปเก่า
        displayIssues.sort(function(a, b) { return new Date(b.dateReported) - new Date(a.dateReported); });

        var html = '';
        displayIssues.forEach(function(issue) {
            var client = MOCK_CLIENTS.find(function(c) { return c.id === issue.clientId; });
            var clientName = client ? client.name : 'ไม่ระบุไซต์งาน';

            // จัดรูปแบบวันที่แบบสั้น
            var dateObj = new Date(issue.dateReported);
            var dateStr = String(dateObj.getDate()).padStart(2, '0') + '-' + String(dateObj.getMonth() + 1).padStart(2, '0') + '-' + dateObj.getFullYear();
            
            var dueDateStr = '';
            if(issue.dueDate) {
                var dd = new Date(issue.dueDate);
                dueDateStr = String(dd.getDate()).padStart(2, '0') + '-' + String(dd.getMonth() + 1).padStart(2, '0') + '-' + dd.getFullYear();
            }

            // จัดการ UI สถานะ (อ้างอิงจากภาพ Design)
            var statusBadge = '';
            if (issue.status === 'Pending') {
                statusBadge = '<span class="px-2.5 py-1 bg-red-100 text-red-600 rounded-full text-[11px] font-bold"><i class="fa-solid fa-circle-exclamation mr-1"></i> รอดำเนินการ</span>';
            } else if (issue.status === 'In Progress') {
                statusBadge = '<span class="px-2.5 py-1 bg-orange-100 text-orange-600 rounded-full text-[11px] font-bold"><i class="fa-solid fa-person-digging mr-1"></i> กำลังแก้ไข</span>';
            } else {
                statusBadge = '<span class="px-2.5 py-1 bg-green-100 text-green-700 rounded-full text-[11px] font-bold"><i class="fa-solid fa-check-circle mr-1"></i> ปิดงานแล้ว</span>';
            }

            var assigneeHtml = issue.assignedTo 
                ? '<div class="text-[12px] font-bold text-gray-800">' + issue.assignedTo + '</div><div class="text-[10px] text-orange-500 font-medium">Due: ' + (dueDateStr||'-') + '</div>'
                : '<span class="text-[11px] text-gray-400 italic">- ยังไม่ระบุ -</span>';

            html += '<tr class="hover:bg-gray-50 transition-colors">' +
                    '<td class="text-center"><span class="text-[11px] font-medium text-gray-500 bg-gray-100 px-2 py-1 rounded">' + issue.id + '</span></td>' +
                    '<td class="text-center font-bold text-gray-700">' + dateStr + '</td>' +
                    '<td><div class="font-bold text-brand text-[13px]">' + clientName + '</div></td>' +
                    '<td><span class="text-[12px] font-medium text-gray-700">' + issue.category + '</span></td>' +
                    '<td><div class="text-[12px] text-gray-600 max-w-xs truncate" title="' + issue.description + '">' + issue.description + '</div></td>' +
                    '<td class="text-center">' + assigneeHtml + '</td>' +
                    '<td class="text-center">' + statusBadge + '</td>' +
                    '<td class="text-center">' +
                        '<button onclick="editIssue(\'' + issue.id + '\')" class="px-3 py-1.5 border border-gray-300 rounded text-[11px] font-bold text-gray-600 hover:bg-[#2b404d] hover:text-white transition shadow-sm">' + (issue.status === 'Resolved' ? 'ดูรายละเอียด' : 'อัปเดต/มอบหมาย') + '</button>' +
                    '</td>' +
                    '</tr>';
        });

        if (!html) {
            html = '<tr><td colspan="8" class="text-center py-12 text-gray-400 italic text-[13px]">- ไม่พบรายการแจ้งปัญหาในสถานะนี้ -</td></tr>';
        }

        tbody.innerHTML = html;
    }

    function openIssueModal() {
        setInputValue('issueId', '');
        setInputValue('issueClient', '');
        if (window.jQuery && $.fn.select2) $('#issueClient').trigger('change.select2');
        
        setInputValue('issueDate', formatDateString(new Date()));
        setInputValue('issueCategory', '');
        setInputValue('issueDesc', '');
        
        // ซ่อนส่วนมอบหมายงานถ้าเป็นการเปิด Ticket ใหม่
        document.getElementById('issueActionSection').classList.add('hidden');
        document.getElementById('issueResolutionSection').classList.add('hidden');
        
        // เคลียร์ค่าส่วน Action
        setInputValue('issueAssignee', '');
        setInputValue('issueDueDate', '');
        setInputValue('issueResolutionNote', '');
        
        // เลือกสถานะ Pending ให้เลยเป็นค่าเริ่มต้น (แต่มองไม่เห็น)
        var radioPending = document.querySelector('input[name="issueStatus"][value="Pending"]');
        if(radioPending) radioPending.checked = true;

        document.getElementById('modalIssueTitle').innerText = 'แจ้งปัญหาคุณภาพใหม่';
        
        var modal = document.getElementById('issueModal');
        if(modal) modal.classList.remove('hidden');
    }

    function editIssue(id) {
        var issue = MOCK_ISSUES.find(function(i) { return i.id === id; });
        if(!issue) return;

        setInputValue('issueId', issue.id);
        setInputValue('issueClient', issue.clientId);
        if (window.jQuery && $.fn.select2) $('#issueClient').trigger('change.select2');
        
        setInputValue('issueDate', issue.dateReported);
        setInputValue('issueCategory', issue.category);
        setInputValue('issueDesc', issue.description);
        
        // เปิดส่วน Action
        document.getElementById('issueActionSection').classList.remove('hidden');
        document.getElementById('issueActionSection').classList.add('flex');
        
        setInputValue('issueAssignee', issue.assignedTo || '');
        setInputValue('issueDueDate', issue.dueDate || '');
        setInputValue('issueResolutionNote', issue.resolutionNote || '');

        var radios = document.getElementsByName('issueStatus');
        for(var i=0; i<radios.length; i++){
            if(radios[i].value === issue.status) radios[i].checked = true;
        }

        toggleResolutionNote(issue.status);

        // ดัก Event การคลิกเปลี่ยน Status
        for(var j=0; j<radios.length; j++){
            radios[j].onchange = function(e) { toggleResolutionNote(e.target.value); };
        }

        document.getElementById('modalIssueTitle').innerText = 'อัปเดตและมอบหมายการแก้ไขปัญหา';
        
        var modal = document.getElementById('issueModal');
        if(modal) modal.classList.remove('hidden');
    }

    function toggleResolutionNote(status) {
        var resSec = document.getElementById('issueResolutionSection');
        if (status === 'Resolved') {
            resSec.classList.remove('hidden');
        } else {
            resSec.classList.add('hidden');
        }
    }

    function saveIssue() {
        var id = document.getElementById('issueId').value;
        var client = document.getElementById('issueClient').value;
        var date = document.getElementById('issueDate').value;
        var cat = document.getElementById('issueCategory').value;
        var desc = document.getElementById('issueDesc').value;

        if(!client || !date || !cat || !desc) {
            if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบถ้วน', message: 'กรุณากรอกข้อมูลที่มีเครื่องหมาย * ให้ครบถ้วน', type: 'warning' });
            return;
        }

        // ดึงสถานะจาก Radio
        var status = 'Pending';
        var radios = document.getElementsByName('issueStatus');
        for(var i=0; i<radios.length; i++){
            if(radios[i].checked) { status = radios[i].value; break; }
        }

        // หากกำลัง Resolved ต้องบังคับให้กรอก Note 
        var resNote = document.getElementById('issueResolutionNote').value;
        if (status === 'Resolved' && !resNote.trim()) {
            if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ลืมสรุปงาน', message: 'กรุณาระบุ "บันทึกผลการแก้ไข" ก่อนปิดงานครับ', type: 'warning' });
            return;
        }

        var issueData = {
            id: id || 'ISS-' + new Date().getTime(),
            clientId: client,
            dateReported: date,
            category: cat,
            description: desc,
            status: status,
            assignedTo: document.getElementById('issueAssignee').value || '',
            dueDate: document.getElementById('issueDueDate').value || '',
            resolutionNote: resNote,
            actionBy: (typeof CURRENT_USER !== 'undefined' && CURRENT_USER) ? CURRENT_USER.email : 'Unknown'
        };

        // Update Local State
        var idx = MOCK_ISSUES.findIndex(function(i) { return i.id === issueData.id; }); 
        if(idx > -1) { MOCK_ISSUES[idx] = issueData; } else { MOCK_ISSUES.push(issueData); }

        // Update Backend
        if (typeof google !== 'undefined' && google.script && google.script.run) { 
            google.script.run.saveIssueToBackend(issueData); 
        }

        closeModal('issueModal');
        renderIssuesTable();
        if(typeof showToast === 'function') showToast('บันทึกข้อมูลปัญหาสำเร็จ');

        // วิสัยทัศน์: สามารถใส่การยิง Webhook ไปหา Line แจ้งเตือนตรงนี้ในอนาคตได้ 
        // เช่น ถ้า id ว่าง (สร้างใหม่) ส่ง Line ทันที
    }
</script>
