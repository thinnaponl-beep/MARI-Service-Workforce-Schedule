<script>

    function generateStaffId() {
        var d = new Date();
        var yy = String(d.getFullYear()).slice(-2);
        var mm = String(d.getMonth() + 1).padStart(2, '0');
        var prefix = 'MARI' + yy + mm;
        
        var maxNum = 0;
        MOCK_HOUSEKEEPERS.forEach(function(hk) {
            if (hk.id && hk.id.startsWith(prefix)) {
                var numStr = hk.id.replace(prefix, '');
                var num = parseInt(numStr, 10);
                if (!isNaN(num) && num > maxNum) {
                    maxNum = num;
                }
            }
        });
        
        return prefix + String(maxNum + 1).padStart(3, '0');
    }

    function uploadStaffImage() {
        var fileInput = document.getElementById('staffImageFile');
        if (!fileInput || !fileInput.files || fileInput.files.length === 0) return;

        var file = fileInput.files[0];
        var reader = new FileReader();

        var statusText = document.getElementById('uploadStatusText');
        if(statusText) {
            statusText.innerText = 'กำลังอัปโหลด... กรุณารอสักครู่';
            statusText.className = 'text-[11px] text-blue-600 font-medium mt-1 block animate-pulse';
        }

        reader.onload = function(e) {
            var base64Data = e.target.result.split(',')[1]; 
            var fileName = 'Profile_' + new Date().getTime() + '_' + file.name;

            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler(function(url) {
                        if(statusText) {
                            statusText.innerText = '✅ อัปโหลดรูปภาพสำเร็จ!';
                            statusText.className = 'text-[11px] text-green-600 font-medium mt-1 block';
                        }
                        setInputValue('staffImage', url);
                    })
                    .withFailureHandler(function(error) {
                        console.error('Upload Error:', error);
                        if(statusText) {
                            statusText.innerText = '❌ เกิดข้อผิดพลาดในการอัปโหลด';
                            statusText.className = 'text-[11px] text-red-600 font-medium mt-1 block';
                        }
                    })
                    .uploadImageToDrive(base64Data, fileName); 
            }
        };
        reader.readAsDataURL(file);
    }

    function saveClient() {
        var id = document.getElementById('clientId').value;
        var name = document.getElementById('clientName').value;
        if(!name) { 
            if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบถ้วน', message: 'กรุณากรอกชื่อไซต์งาน', type: 'warning' }); 
            else alert('กรุณากรอกชื่อไซต์งาน');
            return; 
        }
        
        var detail = document.getElementById('clientAddressDetail').value;
        var prov = document.getElementById('clientProvince').value;
        var dist = document.getElementById('clientDistrict').value;
        var tam = document.getElementById('clientTambon').value;
        var zip = document.getElementById('clientZipcode').value;

        var fullAddress = detail;
        if(tam) fullAddress += (fullAddress ? ' ' : '') + 'ต.' + tam;
        if(zip) fullAddress += (fullAddress ? ' ' : '') + zip;

        var clientData = {
            id: id || 'CL-' + new Date().getTime(), name: name, address: fullAddress, district: dist, province: prov,         
            type: document.getElementById('clientType').value, status: document.getElementById('clientStatus').value,
            contact: document.getElementById('clientContact').value, reqStaff: parseInt(document.getElementById('clientReqStaff').value) || 1,
            color: document.getElementById('clientColor').value,
            contractHours: document.getElementById('clientContractHours').value 
        };
        
        var idx = MOCK_CLIENTS.findIndex(function(c) { return c.id === clientData.id; }); 
        if(idx > -1) {
            MOCK_CLIENTS[idx] = clientData; 
        } else { 
            MOCK_CLIENTS.push(clientData); 
        }
        
        if (typeof google !== 'undefined' && google.script && google.script.run) { google.script.run.saveClientToBackend(clientData); }
        
        closeModal('clientModal'); refreshAllViews(); showToast('บันทึกข้อมูลไซต์งานสำเร็จ');
    }

    function saveStaff() {
        var id = document.getElementById('staffId').value;
        var name = document.getElementById('staffName').value;
        if(!name) { 
            if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบถ้วน', message: 'กรุณากรอกชื่อ-นามสกุล', type: 'warning' }); 
            else alert('กรุณากรอกชื่อ-นามสกุล');
            return; 
        }
        
        var phone = document.getElementById('staffPhone').value;
        if(typeof formatPhoneDisplay === 'function') phone = formatPhoneDisplay(phone);
        
        if (!phone || !/^0[0-9]{9}$/.test(phone)) {
            if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ถูกต้อง', message: 'กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง\n(ต้องขึ้นต้นด้วย 0 และมีตัวเลข 10 หลักพอดี)', type: 'warning' });
            else alert('กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง (ต้องขึ้นต้นด้วย 0 และมีตัวเลข 10 หลักพอดี)');
            return;
        }
        
        var inputAvatar = document.getElementById('staffImage').value;
        var defaultAvatar = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=f0f4f8&color=3d5a6c';
        
        var zonesArr = window.jQuery && $.fn.select2 ? $('#staffZones').val() : [];
        var zonesStr = zonesArr ? zonesArr.join(', ') : '';

        var staffData = {
            id: id || generateStaffId(), 
            name: name,
            nickname: document.getElementById('staffNickname').value || name.split(' ')[0],
            phone: phone, 
            lineId: document.getElementById('staffLine').value,
            type: document.getElementById('staffJobType').value,
            status: document.getElementById('staffStatus').value,
            skills: document.getElementById('staffSkills').value,
            zones: zonesStr,
            maxHoursWeek: document.getElementById('staffMaxHours').value || 48,
            startDate: document.getElementById('staffStartDate').value,
            endDate: document.getElementById('staffEndDate').value,
            avatar: inputAvatar ? inputAvatar : defaultAvatar,
            color: document.getElementById('staffColor').value
        };
        
        var idx = MOCK_HOUSEKEEPERS.findIndex(function(h) { return h.id === staffData.id; }); 
        if(idx > -1) { 
            MOCK_HOUSEKEEPERS[idx] = staffData; 
        } else { 
            MOCK_HOUSEKEEPERS.push(staffData); 
        }
        
        if (typeof google !== 'undefined' && google.script && google.script.run) { google.script.run.saveStaffToBackend(staffData); }
        
        closeModal('staffModal'); refreshAllViews(); showToast('บันทึกข้อมูลพนักงานสำเร็จ');
    }

    function saveUser() {
        var id = document.getElementById('userId').value;
        var name = document.getElementById('userName').value;
        var email = document.getElementById('userEmail').value;
        if(!name || !email) { 
            if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบถ้วน', message: 'กรุณากรอกชื่อและอีเมล', type: 'warning' });

        var userData = { id: id || 'U' + new Date().getTime(), name: name, email: email, role: document.getElementById('userRole').value, status: document.getElementById('userStatus').value };
        
        var idx = MOCK_USERS.findIndex(function(u) { return u.id === userData.id; }); 
        if(idx > -1) {

        closeModal('userModal'); renderUserTable(); showToast('บันทึกสิทธิ์ผู้ใช้งานสำเร็จ');

    function updateAvailableHks() {
        var date = document.getElementById('modalDate').value;
        var start = document.getElementById('modalStart').value;
        var end = document.getElementById('modalEnd').value;
        var shiftId = document.getElementById('modalShiftId').value;
        var hkListContainer = document.getElementById('modalHkList');
        
        if(!date || !start || !end || !hkListContainer) return;

        var timeToMins = function(t) { 
            if(!t) return 0; 
            var p = t.split(':'); 
            return parseInt(p[0]) * 60 + parseInt(p[1]); 
        };
        var startMins = timeToMins(start);
        var endMins = timeToMins(end) < startMins ? timeToMins(end) + 1440 : timeToMins(end);

        var busyHks = new Set();
        MOCK_SHIFTS.forEach(function(s) {
            if (s.date === date && s.status !== 'cancelled' && s.id !== shiftId) {
                var sStart = timeToMins(s.start);
                var sEnd = timeToMins(s.end) < sStart ? timeToMins(s.end) + 1440 : timeToMins(s.end);
                if (Math.max(startMins, sStart) < Math.min(endMins, sEnd)) {
                    if(s.hks) s.hks.forEach(function(hk) { busyHks.add(hk); });
                }
            }
        });

        var currentlySelected = [];
        document.querySelectorAll('.hk-checkbox:checked').forEach(function(cb) { currentlySelected.push(cb.value); });

        hkListContainer.innerHTML = ''; 
        
        MOCK_HOUSEKEEPERS.forEach(function(hk) {
            var isBusy = busyHks.has(hk.id);
            var isChecked = currentlySelected.includes(hk.id);
            
            var div = document.createElement('div');
            var opacityClass = isBusy ? 'opacity-40 cursor-not-allowed bg-gray-100' : 'cursor-pointer hover:bg-brandLight hover:border-brand bg-white';
            var disabledAttr = isBusy ? 'disabled' : '';
            var checkedAttr = isChecked && !isBusy ? 'checked' : '';
            var busyText = isBusy ? '<span class="text-[9px] text-red-500 font-bold block mt-0.5"><i class="fa-solid fa-lock"></i> ติดงานอื่น</span>' : '';

            div.className = "flex items-center gap-3 p-2.5 rounded-md border border-gray-200 transition shadow-sm " + opacityClass;
            var hkColorBorder = 'border: 2px solid ' + (hk.color || '#e5e7eb') + '; padding: 1px;';
            var imgSrc = hk.avatar || 'https://ui-avatars.com/api/?name=U&background=f0f4f8&color=3d5a6c';

            div.innerHTML = '<input type="checkbox" id="hk_' + hk.id + '" value="' + hk.id + '" class="rounded border-gray-300 text-brand focus:ring-brand w-4 h-4 hk-checkbox pointer-events-none" ' + disabledAttr + ' ' + checkedAttr + '>' +
                            '<img src="' + imgSrc + '" onerror="this.src=\'https://ui-avatars.com/api/?name=U&background=f0f4f8&color=3d5a6c\'" class="w-8 h-8 rounded-full object-cover shadow-sm bg-white shrink-0" style="' + hkColorBorder + '">' +
                            '<div class="flex flex-col w-full overflow-hidden">' +
                                '<label class="text-[12px] font-bold text-gray-800 pointer-events-none truncate">' + hk.name + '</label>' +
                                busyText +
                            '</div>';

            if(!isBusy) {
                div.onclick = function(e) {
                    if(e.target.tagName !== 'INPUT') {
                        var cb = document.getElementById('hk_' + hk.id);
                        cb.checked = !cb.checked;
                    }
                };
            }
            hkListContainer.appendChild(div);
        });
    }

    function handleSubstitutionUI() {
        var statusEl = document.getElementById('modalStatus');
        if (!statusEl) return;
        
        var existingReasonDiv = document.getElementById('substitutionReasonContainer');
        
        if (statusEl.value === 'substituted') {
            if (!existingReasonDiv) {
                var reasonDiv = document.createElement('div');
                reasonDiv.id = 'substitutionReasonContainer';
                reasonDiv.className = 'col-span-2 mt-2 bg-orange-50 p-3 rounded-lg border border-orange-100';
                reasonDiv.innerHTML = '<label class="block text-[12px] font-bold text-orange-700 mb-1.5">เหตุผลการเปลี่ยนตัว (Substitution Reason) <span class="text-red-500">*</span></label>' +
                                      '<select id="modalSubReasonDrop" class="w-full border border-orange-200 rounded-md px-3 py-2 text-sm font-medium focus:border-orange-400 outline-none bg-white transition mb-2">' +
                                          '<option value="">-- เลือกเหตุผล --</option>' +
                                          '<option value="พนักงานป่วย/ลากะทันหัน">พนักงานป่วย/ลากะทันหัน</option>' +
                                          '<option value="พนักงานลาออก">พนักงานลาออก</option>' +
                                          '<option value="ลูกค้าขอเปลี่ยนตัว">ลูกค้าขอเปลี่ยนตัว</option>' +
                                          '<option value="เหตุผลอื่นๆ">เหตุผลอื่นๆ (โปรดระบุในหมายเหตุ)</option>' +
                                      '</select>';
                statusEl.parentElement.parentElement.appendChild(reasonDiv);
            }
        } else {
            if (existingReasonDiv) existingReasonDiv.remove();
        }
    }

    function sendSlackNotification(actionType, shiftDataArray) {
        if (!shiftDataArray || shiftDataArray.length === 0) return;
        
        var shift = shiftDataArray[0]; 
        var clientName = "ลูกค้าอ้างอิง";
        var clientEl = document.getElementById('modalClient');
        if(clientEl && clientEl.options[clientEl.selectedIndex]) {
            clientName = clientEl.options[clientEl.selectedIndex].text;
        } else {
            var c = MOCK_CLIENTS.find(function(x){ return x.id === shift.clientId;});
            if(c) clientName = c.name;
        }

        var hkNames = shift.hks.map(function(id) {
            var h = MOCK_HOUSEKEEPERS.find(function(x) { return x.id === id; });
            return h ? h.name : id;
        }).join(', ');

        var subReasonEl = document.getElementById('modalSubReasonDrop');
        var subReason = subReasonEl ? subReasonEl.value : '';

        var payload = {
            action: actionType, 
            clientName: clientName,
            date: shift.date,
            time: shift.start + ' - ' + shift.end,
            hks: hkNames,
            status: shift.status,
            notes: shift.notes || '',
            subReason: subReason,
            totalShifts: shiftDataArray.length,
            user: CURRENT_USER ? CURRENT_USER.name : 'Unknown User'
        };

        if (typeof google !== 'undefined' && google.script && google.script.run) {

            else if(log.action === 'SUBSTITUTE') { actionColor = 'bg-orange-400'; actionIcon = 'fa-user-group'; actionText = 'เปลี่ยนตัวแม่บ้าน'; }
            else if(log.action === 'CANCEL') { actionColor = 'bg-gray-400'; actionIcon = 'fa-xmark'; actionText = 'ยกเลิกกะงาน'; }

            html += '<div class="mb-5 ml-5 relative">' +

    // 💡 ศักดิ์ชัยอัปเดต: ให้ความสำคัญสูงสุดในการแก้ไขให้ง่าย และจบในตัวเอง
    function saveShift() {
        var shiftId = document.getElementById('modalShiftId').value;
        var clientId = document.getElementById('modalClient').value;
        var startDateStr = document.getElementById('modalDate').value;
        var start = document.getElementById('modalStart').value;
        var end = document.getElementById('modalEnd').value;
        var status = document.getElementById('modalStatus').value;
        
        var dateTypeEl = document.getElementById('modalDateType');
        var dateType = dateTypeEl ? dateTypeEl.value : 'single';
        
        // 💡 ล็อกให้การแก้ไขมีผลเฉพาะกะที่เปิดอยู่ ป้องกันบานปลายลามไปวันอื่น (กันการโดนลบข้ามวัน)
        if(shiftId) dateType = 'single'; 

        var endDateEl = document.getElementById('modalEndDate');
        var endDateStr = endDateEl && dateType !== 'single' ? endDateEl.value : startDateStr;
        
        var notesEl = document.getElementById('modalNotes');
        var notes = notesEl ? notesEl.value : '';

        var selectedHks = [];
        document.querySelectorAll('.hk-checkbox:checked').forEach(function(cb) { selectedHks.push(cb.value); });
        
        if(!clientId || !startDateStr || selectedHks.length === 0) { 
            if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบถ้วน', message: 'กรุณาเลือกไซต์งาน วันที่ และพนักงานอย่างน้อย 1 คน', type: 'warning' }); 
            return; 
        }

        var subReasonEl = document.getElementById('modalSubReasonDrop');
        var subReason = subReasonEl ? subReasonEl.value : '';

        // 💡 แก้ปัญหาเปลี่ยนตัว (Substitution): บันทึก Log ว่าเปลี่ยนตัว แล้วเปลี่ยนสถานะกลับเป็น "ยืนยันแล้ว" ให้ปฏิทินสวยงาม ไม่ขึ้นสีส้มค้าง
        var finalStatus = status;
        var actionType = 'CREATE';

        if (shiftId) {
            if (status === 'cancelled') actionType = 'CANCEL';
            else if (status === 'substituted') {
                actionType = 'SUBSTITUTE';
                finalStatus = 'confirmed'; // เปลี่ยนสถานะให้เป็น Confirmed บนปฏิทินอัตโนมัติ
            }
            else actionType = 'UPDATE';
        }

        if (status === 'substituted' && !subReason) {
            if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบถ้วน', message: 'กรุณาระบุเหตุผลการเปลี่ยนตัวแม่บ้าน', type: 'warning' }); 
            return; 
        }

        var timeToMins = function(t) { 
            if(!t) return 0; 
            var p = t.split(':'); 
            return parseInt(p[0]) * 60 + parseInt(p[1]); 
        };
        var newStartMins = timeToMins(start);
        var newEndMins = timeToMins(end) < newStartMins ? timeToMins(end) + 1440 : timeToMins(end);

        var newShifts = [];
        var groupId = shiftId ? (MOCK_SHIFTS.find(s => s.id === shiftId)?.groupId || '') : 'GRP-' + new Date().getTime(); 
        
        var hasConflict = false;
        var conflictErrors = [];

        if (dateType === 'single' || !endDateStr) {
            MOCK_SHIFTS.forEach(function(exShift) {
                if (exShift.date === startDateStr && exShift.status !== 'cancelled' && exShift.id !== shiftId) {
                    var exStartMins = timeToMins(exShift.start);
                    var exEndMins = timeToMins(exShift.end) < exStartMins ? timeToMins(exShift.end) + 1440 : timeToMins(exShift.end);

                    if (Math.max(newStartMins, exStartMins) < Math.min(newEndMins, exEndMins)) {
                        var overlappingHks = selectedHks.filter(function(hk) { return exShift.hks.includes(hk); });
                        if (overlappingHks.length > 0) {
                            hasConflict = true;
                            var hkNames = overlappingHks.map(function(id) {
                                var h = MOCK_HOUSEKEEPERS.find(function(x) { return x.id === id; });
                                return h ? h.name : id;
                            }).join(', ');
                            conflictErrors.push('วันที่ ' + startDateStr + ' (' + start + '-' + end + '): ' + hkNames);
                        }
                    }
                }
            });

            newShifts.push({
                id: shiftId || 'SH-' + new Date().getTime() + '-0',
                clientId: clientId, date: startDateStr, start: start, end: end, hks: selectedHks, status: finalStatus, notes: notes, groupId: groupId
            });
        } else {
            var startDt = new Date(startDateStr);
            var endDt = new Date(endDateStr);
            
            if (endDt < startDt) { 
                if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ถูกต้อง', message: 'วันที่สิ้นสุดต้องมากกว่าหรือเท่ากับวันที่เริ่มต้น', type: 'warning' }); 
                return; 
            }

            var selectedDays = [];
            if (dateType === 'weekly') {
                document.querySelectorAll('.modal-day-cb:checked').forEach(function(cb) { selectedDays.push(parseInt(cb.value)); });
                if (selectedDays.length === 0) { 
                    if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบถ้วน', message: 'กรุณาเลือกวันในสัปดาห์อย่างน้อย 1 วัน', type: 'warning' }); 
                    return; 
                }
            }

            var currDt = new Date(startDt);
            var count = 0;
            
            while (currDt <= endDt && count < 365) {
                var isMatch = false;
                if (dateType === 'range') {
                    isMatch = true;
                } else if (dateType === 'weekly' && selectedDays.includes(currDt.getDay())) {
                    isMatch = true; 
                }

                if (isMatch) {
                    var dateString = typeof formatDateString === 'function' ? formatDateString(currDt) : currDt.toISOString().split('T')[0];
                    var idToUse = (count === 0 && shiftId) ? shiftId : 'SH-' + new Date().getTime() + '-' + count;
                    
                    MOCK_SHIFTS.forEach(function(exShift) {
                        if (exShift.date === dateString && exShift.status !== 'cancelled' && exShift.id !== idToUse && exShift.id !== shiftId) {
                            var exStartMins = timeToMins(exShift.start);
                            var exEndMins = timeToMins(exShift.end) < exStartMins ? timeToMins(exShift.end) + 1440 : timeToMins(exShift.end);

                            if (Math.max(newStartMins, exStartMins) < Math.min(newEndMins, exEndMins)) {
                                var overlappingHks = selectedHks.filter(function(hk) { return exShift.hks.includes(hk); });
                                if (overlappingHks.length > 0) {
                                    hasConflict = true;
                                    var hkNames = overlappingHks.map(function(id) {
                                        var h = MOCK_HOUSEKEEPERS.find(function(x) { return x.id === id; });
                                        return h ? h.name : id;
                                    }).join(', ');
                                    var errMsg = 'วันที่ ' + dateString + ' (' + start + '-' + end + '): ' + hkNames;
                                    if(!conflictErrors.includes(errMsg)) conflictErrors.push(errMsg);
                                }
                            }
                        }
                    });

                    newShifts.push({
                        id: idToUse, clientId: clientId, date: dateString, start: start, end: end, hks: selectedHks, status: finalStatus, notes: notes, groupId: groupId
                    });
                }
                currDt.setDate(currDt.getDate() + 1);
                count++;
            }
        }

        if (hasConflict) {
            var displayErrors = conflictErrors.slice(0, 5).join('\n- ');
            if (conflictErrors.length > 5) displayErrors += '\n... และวันอื่นๆ อีก ' + (conflictErrors.length - 5) + ' รายการ';
            
            if(typeof showCustomDialog === 'function') {
                showCustomDialog({ 
                    title: 'พบกะงานทับซ้อน! (ไม่อนุญาตให้บันทึก)', 
                    message: 'แม่บ้านมีคิวงานอื่นอยู่แล้วในวันและเวลาที่ท่านเลือก:\n\n- ' + displayErrors + '\n\n*กรุณาเปลี่ยนเวลา หรือถอดรายชื่อแม่บ้านที่ทับซ้อนออก', 
                    type: 'delete' 
                });
            } else {
                alert("พบกะงานทับซ้อน!\n" + displayErrors);
            }
            return; 
        }

        if (newShifts.length === 0) { 
            if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ไม่พบวันทำงาน', message: 'ไม่มีวันทำงานที่ตรงกับเงื่อนไขที่เลือก\n(อาจไม่ได้เลือกวันในสัปดาห์ให้ตรงกับช่วงวันที่ระบุ)', type: 'warning' }); 
            return; 
        }

        // เซฟลง Mock แบบทับของเก่าด้วย ID
        newShifts.forEach(function(shiftData) {
            var idx = MOCK_SHIFTS.findIndex(function(s) { return s.id === shiftData.id; }); 
            if(idx > -1) { MOCK_SHIFTS[idx] = shiftData; } else { MOCK_SHIFTS.push(shiftData); }
        });
        
        if (typeof google !== 'undefined' && google.script && google.script.run) { 
            var saveBtn = document.querySelector('#shiftModal button[onclick="saveShift()"]');
            var originalText = saveBtn.innerHTML;
            if(saveBtn) { saveBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> บันทึก...'; saveBtn.disabled = true; }

            google.script.run
                .withSuccessHandler(function(res) {
                    if(saveBtn) { saveBtn.innerHTML = originalText; saveBtn.disabled = false; }
                    closeModal('shiftModal'); 
                    filterGridData(); 
                    showToast(res.message);
                    
                    sendSlackNotification(actionType, newShifts);

                    if (res.warnings && res.warnings.length > 0) {
                        if(typeof showCustomDialog === 'function') {
                            showCustomDialog({ 
                                title: 'พบข้อควรระวัง (Warnings)', 
                                message: "แจ้งเตือนจากการจัดกะงาน:\n\n- " + res.warnings.join("\n- "), 
                                type: 'warning' 
                            });
                        }
                    }
                })
                .withFailureHandler(function(err) {
                    if(saveBtn) { saveBtn.innerHTML = originalText; saveBtn.disabled = false; }
                    if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'บันทึกล้มเหลว', message: String(err), type: 'delete' });
                })
                .saveMultipleShiftsToBackend(newShifts);
        } else {
            closeModal('shiftModal'); 
            filterGridData(); 
            showToast("บันทึกตารางงานสำเร็จ (Mock)");
            sendSlackNotification(actionType, newShifts);
        }
    }

    function openShiftModal(prefillClientId = '', prefillDate = '') {
        setInputValue('modalShiftId', '');
        setInputValue('modalClient', prefillClientId);
        if (window.jQuery && $.fn.select2) $('#modalClient').trigger('change.select2');

        setInputValue('modalDate', prefillDate || formatDateString(new Date()));

        var dateTypeEl = document.getElementById('modalDateType');
        if(dateTypeEl) dateTypeEl.disabled = false;

        document.querySelectorAll('.modal-day-cb').forEach(function(cb) { cb.checked = false; });
        
        if(typeof toggleRecurringUI === 'function') toggleRecurringUI();
        handleSubstitutionUI(); 

        attachModalListeners();
        
        // 💡 แก้บั๊ก: ล้างการติ๊กเลือกแม่บ้านที่ค้างอยู่จากรอบก่อนหน้าให้หมด
        document.querySelectorAll('.hk-checkbox').forEach(function(cb) { cb.checked = false; });
        
        updateAvailableHks(); 

        // 💡 ซ่อนแถบประวัติเมื่อสร้างใหม่
        var historySidebar = document.getElementById('shiftHistorySidebar');
        if(historySidebar) historySidebar.classList.add('hidden');
        
        var titleEl = document.getElementById('modalShiftTitle');
        if(titleEl) titleEl.innerText = 'สร้างตารางงานใหม่';
        
        var btnDel = document.getElementById('btnDeleteShift');
        if (btnDel) btnDel.classList.add('hidden'); 
        
        var modal = document.getElementById('shiftModal');
        if(modal) modal.classList.remove('hidden');
    }

    function editShift(id) {
        var s = MOCK_SHIFTS.find(function(x) { return x.id === id; }); 
        if(!s) return;
        
        setInputValue('modalShiftId', s.id);
        setInputValue('modalClient', s.clientId);
        if (window.jQuery && $.fn.select2) $('#modalClient').trigger('change.select2');

        setInputValue('modalDate', s.date);
        setInputValue('modalStart', s.start);
        setInputValue('modalEnd', s.end);
        setInputValue('modalStatus', s.status);
        
        setInputValue('modalNotes', s.notes || '');
        
        // 💡 ล็อกให้เวลาแก้ ต้องแก้เป็นวันๆ ไป ไม่ให้แก้มั่วข้ามวัน
        setInputValue('modalDateType', 'single');
        var dateTypeEl = document.getElementById('modalDateType');
        if(dateTypeEl) dateTypeEl.disabled = true; 

        if(typeof toggleRecurringUI === 'function') toggleRecurringUI();
        handleSubstitutionUI();

        attachModalListeners();
        
        // 💡 แก้บั๊ก: ล้างการติ๊กเลือกทั้งหมดก่อน เพื่อดึงเฉพาะคนที่อยู่ในกะนี้จริงๆ มาแสดง
        document.querySelectorAll('.hk-checkbox').forEach(function(cb) { cb.checked = false; });
        
        updateAvailableHks(); 
        
        // ติ๊กเลือกแม่บ้านที่เคยเลือกไว้
        document.querySelectorAll('.hk-checkbox').forEach(function(cb) { 
            if(s.hks.includes(cb.value)) {
                cb.checked = true;
            }
        });

        // 💡 โหลดประวัติเมื่อแก้ไข
        loadShiftHistory(id);

        var titleEl = document.getElementById('modalShiftTitle');
        if(titleEl) titleEl.innerText = 'แก้ไขตารางงาน';
        
        var btnDel = document.getElementById('btnDeleteShift');
        if (btnDel) btnDel.classList.remove('hidden'); 
        
        var modal = document.getElementById('shiftModal');
        if(modal) modal.classList.remove('hidden');
    }

    function openClientModal() {

        setInputValue('clientProvince', '');

        var elDist = document.getElementById('clientDistrict');

        if (window.jQuery && $.fn.select2) $('#clientTambon').trigger('change.select2');
        
        setInputValue('clientZipcode', '');
        setInputValue('clientType', 'B2B'); setInputValue('clientStatus', 'Active'); setInputValue('clientContact', ''); setInputValue('clientReqStaff', '1'); setInputValue('clientContractHours', '');

        var modal = document.getElementById('clientModal');
        if(modal) modal.classList.remove('hidden');
    }

    function editClient(id) {
        var c = MOCK_CLIENTS.find(function(x) { return x.id === id; }); 
        if(!c) return;
        
        setInputValue('clientId', c.id); 
        setInputValue('clientName', c.name); 
        setInputValue('clientAddressDetail', c.address || '');
        
        setInputValue('clientProvince', c.province || ''); 
        var provEl = document.getElementById('clientProvince');
        if(provEl) provEl.dispatchEvent(new Event('change'));
        if (window.jQuery && $.fn.select2) $('#clientProvince').trigger('change.select2');
        
        setTimeout(function() {
            setInputValue('clientDistrict', c.district || '');
            var distEl = document.getElementById('clientDistrict');
            if(distEl) distEl.dispatchEvent(new Event('change'));
            if (window.jQuery && $.fn.select2) $('#clientDistrict').trigger('change.select2');
            
            setTimeout(function() {
                var tamMatch = c.address ? c.address.match(/ต\.([^\s0-9]+)/) : null;
                var tamValue = tamMatch && tamMatch[1] ? tamMatch[1] : '';
                setInputValue('clientTambon', tamValue);
                if (window.jQuery && $.fn.select2) $('#clientTambon').trigger('change.select2');
                
                var zipMatch = c.address ? c.address.match(/\b\d{5}\b/) : null;
                setInputValue('clientZipcode', zipMatch ? zipMatch[0] : '');
            }, 50);
        }, 50);

        setInputValue('clientType', c.type || 'B2B'); setInputValue('clientStatus', c.status || 'Active'); setInputValue('clientContact', c.contact || ''); setInputValue('clientReqStaff', c.reqStaff || 1); setInputValue('clientColor', c.color || '#3d5a6c'); setInputValue('clientContractHours', c.contractHours || '');
        
        var titleEl = document.getElementById('modalClientTitle');
        if(titleEl) titleEl.innerText = 'แก้ไขข้อมูลไซต์งาน'; 
        
        var modal = document.getElementById('clientModal');
        if(modal) modal.classList.remove('hidden');
    }

    function editStaff(id) {
        var h = MOCK_HOUSEKEEPERS.find(function(x) { return x.id === id; });

        setInputValue('staffId', h.id); 
        setInputValue('staffName', h.name);

        setInputValue('staffPhone', h.phone || ''); 
        setInputValue('staffLine', h.lineId || '');

        setInputValue('staffStatus', h.status || 'Active'); 
        setInputValue('staffSkills', h.skills || '');

        setInputValue('staffMaxHours', h.maxHoursWeek || '48');
        setInputValue('staffStartDate', h.startDate || '');
        setInputValue('staffEndDate', h.endDate || '');

        if(modal) modal.classList.remove('hidden');
    }

    function initModalForms() {
        var clientSelect = document.getElementById('modalClient');
        if (clientSelect) { 
            clientSelect.innerHTML = '<option value="">-- เลือกสถานที่ --</option>'; 
            MOCK_CLIENTS.forEach(function(c) { 
                var opt = document.createElement('option'); opt.value = c.id; opt.text = c.name; clientSelect.appendChild(opt); 
            });
            if (window.jQuery && $.fn.select2) $('#modalClient').trigger('change.select2');
        }
    }
