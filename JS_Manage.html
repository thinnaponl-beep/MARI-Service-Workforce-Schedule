<!-- (จัดการตารางพนักงาน ไซต์งาน และบันทึกข้อมูล) -->
<script>
    // ==========================================
    // 3. MANAGE & MODALS (STAFF, CLIENTS, USERS, SHIFTS)
    // ==========================================
    
    // ------------------------------------------
    // ส่วนที่ 1: จัดการพนักงาน (Staff)
    // ------------------------------------------
    function generateStaffId() {
        var d = new Date();
        var yy = String(d.getFullYear()).slice(-2);
        var mm = String(d.getMonth() + 1).padStart(2, '0');
        var prefix = 'MARI' + yy + mm;
        var maxNum = 0;
        MOCK_HOUSEKEEPERS.forEach(function(hk) {
            if (hk.id && hk.id.startsWith(prefix)) {
                var numStr = hk.id.replace(prefix, '');
                var num = parseInt(numStr, 10);
                if (!isNaN(num) && num > maxNum) { maxNum = num; }
            }
        });
        return prefix + String(maxNum + 1).padStart(3, '0');
    }

    function uploadStaffImage() {
        var fileInput = document.getElementById('staffImageFile');
        if (!fileInput || !fileInput.files || fileInput.files.length === 0) return;
        var file = fileInput.files[0];
        var reader = new FileReader();
        var statusText = document.getElementById('uploadStatusText');
        
        // 💡 1. เรียกใช้งาน Loading Overlay แบบเต็มหน้าจอมาบังทันที
        var loadingOverlay = document.getElementById('loadingOverlay');
        var loadingText = document.getElementById('loadingText');
        if (loadingOverlay && loadingText) {
            loadingText.innerText = 'กำลังอัปโหลดรูปภาพโปรไฟล์... กรุณารอสักครู่ (ห้ามปิดหน้าต่าง)';
            loadingOverlay.style.opacity = '1';
            loadingOverlay.classList.remove('hidden');
        }

        if(statusText) {
            statusText.innerText = 'กำลังอัปโหลด... กรุณารอสักครู่';
            statusText.className = 'text-[11px] text-blue-600 font-medium mt-1 block animate-pulse';
        }

        reader.onload = function(e) {
            var base64Data = e.target.result.split(',')[1]; 
            var fileName = 'Profile_' + new Date().getTime() + '_' + file.name;

            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler(function(url) {
                        // 💡 2. เอา Loading ออกเมื่ออัปโหลดเสร็จ
                        if (loadingOverlay) loadingOverlay.classList.add('hidden');

                        if(statusText) { 
                            statusText.innerText = '✅ อัปโหลดรูปภาพสำเร็จ! กดบันทึกเพื่อยืนยัน'; 
                            statusText.className = 'text-[11px] text-green-600 font-medium mt-1 block'; 
                        }
                        setInputValue('staffImage', url);
                        if(typeof showToast === 'function') showToast('อัปโหลดรูปภาพสำเร็จ');
                    })
                    .withFailureHandler(function(error) {
                        // 💡 2. เอา Loading ออกเมื่ออัปโหลดล้มเหลว
                        if (loadingOverlay) loadingOverlay.classList.add('hidden');

                        if(statusText) { 
                            statusText.innerText = '❌ เกิดข้อผิดพลาดในการอัปโหลด'; 
                            statusText.className = 'text-[11px] text-red-600 font-medium mt-1 block'; 
                        }
                        if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อผิดพลาด', message: 'ไม่สามารถอัปโหลดรูปได้: ' + error, type: 'warning' });
                    })
                    .uploadImageToDrive(base64Data, fileName); 
            }
        };
        reader.readAsDataURL(file);
    }

    function renderStaffTable() {
        var tbody = document.getElementById('staffTableBody');
        if (!tbody) return;
        var html = '';
        MOCK_HOUSEKEEPERS.forEach(function(hk) {
            var statusBadge = hk.status === 'Active' 
                ? '<span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-[10px] font-bold">Active</span>' 
                : '<span class="px-2 py-1 bg-gray-100 text-gray-600 rounded-full text-[10px] font-bold">' + hk.status + '</span>';
            var hkColorBorder = 'border: 2px solid ' + (hk.color || '#e5e7eb') + '; padding: 2px; background: white;';
            var imgSrc = hk.avatar || 'https://ui-avatars.com/api/?name=U&background=f0f4f8&color=3d5a6c';
            
            var actionBtns = '<button onclick="editStaff(\'' + hk.id + '\')" class="text-gray-400 hover:text-brand px-2 transition bg-white hover:bg-brandLight border border-gray-200 hover:border-brand/30 w-8 h-8 rounded-md shadow-sm"><i class="fa-solid fa-pen-to-square"></i></button>';
            if (CURRENT_USER && (CURRENT_USER.role === 'Admin / Supervisor' || CURRENT_USER.role === 'Admin')) {
                actionBtns += '<button onclick="deleteStaff(\'' + hk.id + '\')" class="text-red-400 hover:text-red-600 px-2 transition bg-white hover:bg-red-50 border border-gray-200 hover:border-red-200 w-8 h-8 rounded-md shadow-sm ml-1.5" title="ลบข้อมูลพนักงาน"><i class="fa-solid fa-trash-can"></i></button>';
            }

            html += '<tr class="group hover:bg-brandLight/40 transition-colors">' +
                    '<td class="text-center py-3"><div class="relative inline-block cursor-pointer transform hover:scale-105 transition-all duration-200" onclick="previewImage(\'' + imgSrc + '\', \'' + hk.name + '\')" title="คลิกเพื่อขยายรูปภาพ"><img src="' + imgSrc + '" onerror="this.src=\'https://ui-avatars.com/api/?name=U&background=f0f4f8&color=3d5a6c\'" class="w-14 h-14 rounded-full mx-auto object-cover shadow-sm" style="' + hkColorBorder + '"><div class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-magnifying-glass-plus text-white text-xs"></i></div></div></td>' +
                    '<td class="max-w-[200px]"><div class="font-bold text-gray-900 text-[14px] truncate">' + hk.name + '</div><div class="text-[11px] text-gray-500 font-medium mt-0.5 truncate">' + hk.id + '</div></td>' +
                    '<td><span class="font-bold text-brand bg-brandLight px-2 py-1 rounded text-[12px]">' + (hk.nickname || '-') + '</span></td>' +
                    '<td><div class="text-[13px] font-medium">' + (hk.phone || '-') + '</div><span class="text-[11px] text-gray-500">LINE: ' + (hk.lineId || '-') + '</span></td>' +
                    '<td class="text-center"><span class="px-2.5 py-1 bg-blue-50 text-brand rounded-md text-[11px] font-bold border border-blue-100">' + hk.type + '</span></td>' +
                    '<td class="text-center">' + statusBadge + '</td>' +
                    '<td class="text-right pr-6 whitespace-nowrap">' + actionBtns + '</td>' +
                    '</tr>';
        });
        tbody.innerHTML = html;
    }

    // ------------------------------------------
    // ส่วนที่ 2: จัดการไซต์งาน (Clients)
    // ------------------------------------------
    function renderClientTable() {
        var tbody = document.getElementById('clientTableBody');
        if (!tbody) return;
        var html = '';
        MOCK_CLIENTS.forEach(function(c) {
            if(c.type === 'system') return; 
            var statusBadge = c.status === 'Active' 
                ? '<span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-[10px] font-bold">Active</span>' 
                : '<span class="px-2 py-1 bg-red-100 text-red-700 rounded-full text-[10px] font-bold">' + c.status + '</span>';
            var locationText = (c.district && c.province) ? c.district + ', ' + c.province : (c.district || c.province || '-');
            var actionBtns = '<button onclick="editClient(\'' + c.id + '\')" class="text-gray-400 hover:text-brand px-2 transition bg-white hover:bg-brandLight border border-gray-200 hover:border-brand/30 w-8 h-8 rounded-md shadow-sm"><i class="fa-solid fa-pen-to-square"></i></button>';
            if (CURRENT_USER && (CURRENT_USER.role === 'Admin / Supervisor' || CURRENT_USER.role === 'Admin')) {
                actionBtns += '<button onclick="deleteClient(\'' + c.id + '\')" class="text-red-400 hover:text-red-600 px-2 transition bg-white hover:bg-red-50 border border-gray-200 hover:border-red-200 w-8 h-8 rounded-md shadow-sm ml-1.5" title="ลบข้อมูลไซต์งาน"><i class="fa-solid fa-trash-can"></i></button>';
            }

            html += '<tr>' +
                    '<td><div class="flex items-center gap-3"><div class="w-3.5 h-3.5 rounded-sm shadow-sm" style="background-color: ' + c.color + '"></div><div class="flex flex-col"><span class="font-bold text-gray-900">' + c.name + '</span><span class="text-[11px] text-gray-500 font-medium">' + c.id + '</span></div></div></td>' +
                    '<td><span class="text-[12px] font-medium text-gray-600 bg-gray-100 px-2 py-1 rounded">' + c.type + '</span></td>' +
                    '<td><div class="max-w-[200px] truncate font-medium text-gray-800" title="' + locationText + '">' + locationText + '</div><div class="text-[11px] text-gray-500 truncate max-w-[200px] mt-0.5" title="' + (c.address || '') + '">' + (c.address || '') + '</div></td>' +
                    '<td><div class="text-[13px] font-medium">' + (c.contact || '-') + '</div><span class="text-[11px] text-gray-500">' + (c.phone || '') + '</span></td>' +
                    '<td class="text-center font-bold text-brand">' + c.reqStaff + '</td>' +
                    '<td>' + statusBadge + '</td>' +
                    '<td class="text-right pr-6 whitespace-nowrap">' + actionBtns + '</td>' +
                    '</tr>';
        });
        tbody.innerHTML = html;
    }

    // ------------------------------------------
    // ส่วนที่ 3: จัดการผู้ใช้งาน (Users)
    // ------------------------------------------
    function renderUserTable() {
        var tbody = document.getElementById('userTableBody');
        if (!tbody) return;
        var html = '';
        MOCK_USERS.forEach(function(u) {
            var statusBadge = u.status === 'Active' ? '<span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-[10px] font-bold">Active</span>' : '<span class="px-2 py-1 bg-gray-100 text-gray-600 rounded-full text-[10px] font-bold">Inactive</span>';
            var roleClass = (u.role === 'Admin / Supervisor' || u.role === 'Admin') ? 'text-purple-600 bg-purple-50 border-purple-100' : ((u.role === 'AE/หัวหน้าแม่บ้าน' || u.role === 'Supervisor') ? 'text-blue-600 bg-blue-50 border-blue-100' : 'text-gray-600 bg-gray-50 border-gray-200');
            html += '<tr><td class="font-bold text-gray-900">' + u.name + '</td><td class="text-gray-600">' + u.email + '</td><td><span class="px-2 py-1 rounded text-[11px] font-bold border ' + roleClass + '">' + u.role + '</span></td><td>' + statusBadge + '</td><td class="text-right"><button onclick="editUser(\'' + u.id + '\')" class="text-gray-400 hover:text-brand px-2 transition bg-gray-50 hover:bg-brandLight w-8 h-8 rounded"><i class="fa-solid fa-pen-to-square"></i></button></td></tr>';
        });
        tbody.innerHTML = html;
    }

    // ------------------------------------------
    // ส่วนที่ 4: ฟังก์ชัน Save ข้อมูลหลัก
    // ------------------------------------------
    function saveClient() {
        var id = document.getElementById('clientId').value;
        var name = document.getElementById('clientName').value;
        if(!name) { if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบถ้วน', message: 'กรุณากรอกชื่อไซต์งาน', type: 'warning' }); return; }
        
        var detail = document.getElementById('clientAddressDetail').value;
        var prov = document.getElementById('clientProvince').value;
        var dist = document.getElementById('clientDistrict').value;
        var tam = document.getElementById('clientTambon').value;
        var zip = document.getElementById('clientZipcode').value;

        var fullAddress = detail;
        if(tam) fullAddress += (fullAddress ? ' ' : '') + 'ต.' + tam;
        if(zip) fullAddress += (fullAddress ? ' ' : '') + zip;

        var clientData = {
            id: id || 'CL-' + new Date().getTime(), name: name, address: fullAddress, district: dist, province: prov,         
            type: document.getElementById('clientType').value, status: document.getElementById('clientStatus').value,
            contact: document.getElementById('clientContact').value, reqStaff: parseInt(document.getElementById('clientReqStaff').value) || 1,
            color: document.getElementById('clientColor').value, contractHours: document.getElementById('clientContractHours').value,
            actionBy: CURRENT_USER ? CURRENT_USER.email : 'Unknown'
        };
        
        var idx = MOCK_CLIENTS.findIndex(function(c) { return c.id === clientData.id; }); 
        if(idx > -1) { MOCK_CLIENTS[idx] = clientData; } else { MOCK_CLIENTS.push(clientData); }
        if (typeof google !== 'undefined' && google.script && google.script.run) { google.script.run.saveClientToBackend(clientData); }
        closeModal('clientModal'); refreshAllViews(); showToast('บันทึกข้อมูลไซต์งานสำเร็จ');
    }

    function saveStaff() {
        // 💡 แจ้งเตือนและบล็อกไม่ให้เซฟหากกำลังอัปโหลดรูปภาพ
        if (window.isUploadingStaffImage) {
            if(typeof showCustomDialog === 'function') {
                showCustomDialog({ title: 'กำลังอัปโหลดรูปภาพ', message: 'กรุณารอสักครู่ ระบบกำลังประมวลผลรูปโปรไฟล์ให้เสร็จสิ้นก่อนครับ', type: 'warning' });
            } else {
                alert('กำลังอัปโหลดรูปภาพ กรุณารอสักครู่...');
            }
            return;
        }

        var id = document.getElementById('staffId').value;
        var name = document.getElementById('staffName').value;
        if(!name) { if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบถ้วน', message: 'กรุณากรอกชื่อ-นามสกุล', type: 'warning' }); return; }
        
        var phone = document.getElementById('staffPhone').value;
        if(typeof formatPhoneDisplay === 'function') phone = formatPhoneDisplay(phone);
        if (!phone || !/^0[0-9]{9}$/.test(phone)) {
            if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ถูกต้อง', message: 'กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง\n(ต้องขึ้นต้นด้วย 0 และมีตัวเลข 10 หลักพอดี)', type: 'warning' });
            return;
        }
        
        var inputAvatar = document.getElementById('staffImage').value;
        var defaultAvatar = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=f0f4f8&color=3d5a6c';
        var zonesArr = window.jQuery && $.fn.select2 ? $('#staffZones').val() : [];
        var zonesStr = zonesArr ? zonesArr.join(', ') : '';

        var staffData = {
            id: id || generateStaffId(), name: name, nickname: document.getElementById('staffNickname').value || name.split(' ')[0],
            phone: phone, lineId: document.getElementById('staffLine').value,
            type: document.getElementById('staffJobType').value, status: document.getElementById('staffStatus').value,
            skills: document.getElementById('staffSkills').value, zones: zonesStr,
            maxHoursWeek: document.getElementById('staffMaxHours').value || 48,
            startDate: document.getElementById('staffStartDate').value, endDate: document.getElementById('staffEndDate').value,
            avatar: inputAvatar ? inputAvatar : defaultAvatar, color: document.getElementById('staffColor').value,
            actionBy: CURRENT_USER ? CURRENT_USER.email : 'Unknown'
        };
        
        var idx = MOCK_HOUSEKEEPERS.findIndex(function(h) { return h.id === staffData.id; }); 
        if(idx > -1) { MOCK_HOUSEKEEPERS[idx] = staffData; } else { MOCK_HOUSEKEEPERS.push(staffData); }
        if (typeof google !== 'undefined' && google.script && google.script.run) { google.script.run.saveStaffToBackend(staffData); }
        closeModal('staffModal'); refreshAllViews(); showToast('บันทึกข้อมูลพนักงานสำเร็จ');
    }

    function saveUser() {
        var id = document.getElementById('userId').value;
        var name = document.getElementById('userName').value;
        var email = document.getElementById('userEmail').value;
        if(!name || !email) { if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบถ้วน', message: 'กรุณากรอกชื่อและอีเมล', type: 'warning' }); return; }
        
        var userData = { id: id || 'U' + new Date().getTime(), name: name, email: email, role: document.getElementById('userRole').value, status: document.getElementById('userStatus').value };
        var idx = MOCK_USERS.findIndex(function(u) { return u.id === userData.id; }); 
        if(idx > -1) { MOCK_USERS[idx] = userData; } else { MOCK_USERS.push(userData); }
        if (typeof google !== 'undefined' && google.script && google.script.run) { google.script.run.saveUserToBackend(userData); }
        closeModal('userModal'); renderUserTable(); showToast('บันทึกสิทธิ์ผู้ใช้งานสำเร็จ');
    }

    // ------------------------------------------
    // ส่วนที่ 5: ฟังก์ชันกะงาน (Shifts)
    // ------------------------------------------
    
    function ensureSubReasonBox() {
        var existingReasonDiv = document.getElementById('substitutionReasonContainer');
        if (!existingReasonDiv) {
            var reasonDiv = document.createElement('div');
            reasonDiv.id = 'substitutionReasonContainer';
            reasonDiv.className = 'col-span-2 mt-2 bg-orange-50 p-4 rounded-lg border border-orange-200 hidden transition-all';
            reasonDiv.innerHTML = '<label class="block text-[13px] font-bold text-orange-700 mb-1.5"><i class="fa-solid fa-users-arrows-right mr-1"></i> ตรวจพบการเปลี่ยนตัวแม่บ้าน กรุณาระบุเหตุผล <span class="text-red-500">*</span></label>' +
                                  '<select id="modalSubReasonDrop" class="w-full border border-orange-300 rounded-md px-3 py-2.5 text-sm font-medium focus:border-orange-500 outline-none bg-white transition mb-1 shadow-sm">' +
                                      '<option value="">-- คลิกเพื่อเลือกเหตุผล --</option>' +
                                      '<option value="พนักงานป่วย/ลากะทันหัน">พนักงานป่วย/ลากะทันหัน</option>' +
                                      '<option value="พนักงานลาออก">พนักงานลาออก</option>' +
                                      '<option value="ลูกค้าขอเปลี่ยนตัว">ลูกค้าขอเปลี่ยนตัว</option>' +
                                      '<option value="เหตุผลอื่นๆ">เหตุผลอื่นๆ (โปรดระบุในหมายเหตุ)</option>' +
                                  '</select>';
            var statusEl = document.getElementById('modalStatus');
            if(statusEl) statusEl.parentElement.parentElement.appendChild(reasonDiv);
        } else {
            existingReasonDiv.classList.add('hidden');
            var drop = document.getElementById('modalSubReasonDrop');
            if(drop) drop.value = '';
        }
    }

    function filterModalHks() {
        var inputEl = document.getElementById('hkSearchInput');
        if (!inputEl) return;
        var filter = inputEl.value.toLowerCase();
        var items = document.querySelectorAll('.hk-list-item');
        
        items.forEach(function(item) {
            var name = item.getAttribute('data-name');
            if (name && name.toLowerCase().includes(filter)) {
                item.style.display = 'flex';
            } else {
                item.style.display = 'none';
            }
        });
    }

    function updateAvailableHks() {
        var date = document.getElementById('modalDate').value;
        var start = document.getElementById('modalStart').value;
        var end = document.getElementById('modalEnd').value;
        var shiftId = document.getElementById('modalShiftId').value;
        var hkListContainer = document.getElementById('modalHkList');
        var clientId = document.getElementById('modalClient').value;
        
        if(!date || !start || !end || !hkListContainer) return;

        var selectedClient = MOCK_CLIENTS.find(function(c) { return c.id === clientId; });
        var maxReq = selectedClient ? (parseInt(selectedClient.reqStaff) || 1) : 1;

        var alreadyAssignedHks = new Set();
        MOCK_SHIFTS.forEach(function(s) {
            if (s.clientId === clientId && s.date === date && s.id !== shiftId && s.status !== 'cancelled') {
                if(s.hks) s.hks.forEach(function(hk) { alreadyAssignedHks.add(hk); });
            }
        });

        var labels = document.querySelectorAll('label');
        labels.forEach(function(lbl) {
            if(lbl.innerText.includes('แม่บ้านที่มอบหมาย')) {
                lbl.innerHTML = 'แม่บ้านที่มอบหมาย <span class="text-brand font-black ml-1 px-2 py-0.5 bg-brandLight border border-brand/20 rounded-full text-[11px]">โควต้ารายวัน: ' + maxReq + ' คน</span> <span class="text-red-500">*</span> <span class="text-[10px] font-normal text-gray-400 hidden sm:inline-block">(นับรวมทุกกะในวันนี้)</span>';
            }
        });

        var timeToMins = function(t) { if(!t) return 0; var p = t.split(':'); return parseInt(p[0]) * 60 + parseInt(p[1]); };
        var startMins = timeToMins(start);
        var endMins = timeToMins(end) < startMins ? timeToMins(end) + 1440 : timeToMins(end);

        var busyHks = new Set();
        MOCK_SHIFTS.forEach(function(s) {
            if (s.date === date && s.status !== 'cancelled' && s.id !== shiftId) {
                var sStart = timeToMins(s.start);
                var sEnd = timeToMins(s.end) < sStart ? timeToMins(s.end) + 1440 : timeToMins(s.end);
                if (Math.max(startMins, sStart) < Math.min(endMins, sEnd)) {
                    if(s.hks) s.hks.forEach(function(hk) { busyHks.add(hk); });
                }
            }
        });

        var currentlySelected = [];
        hkListContainer.querySelectorAll('.hk-checkbox:checked').forEach(function(cb) { currentlySelected.push(cb.value); });

        hkListContainer.innerHTML = ''; 
        
        MOCK_HOUSEKEEPERS.forEach(function(hk) {
            var isBusy = busyHks.has(hk.id);
            var isChecked = currentlySelected.includes(hk.id);
            
            var div = document.createElement('div');
            var opacityClass = isBusy ? 'opacity-40 cursor-not-allowed bg-gray-100' : 'cursor-pointer hover:bg-brandLight hover:border-brand bg-white';
            var disabledAttr = isBusy ? 'disabled' : '';
            var checkedAttr = isChecked && !isBusy ? 'checked' : '';
            var busyText = isBusy ? '<span class="text-[9px] text-red-500 font-bold block mt-0.5"><i class="fa-solid fa-lock"></i> ติดงานอื่น</span>' : '';

            div.className = "hk-list-item flex items-center gap-3 p-2.5 rounded-md border border-gray-200 transition shadow-sm " + opacityClass;
            div.setAttribute('data-name', hk.name + ' ' + (hk.nickname || ''));
            
            var hkColorBorder = 'border: 2px solid ' + (hk.color || '#e5e7eb') + '; padding: 1px;';
            var imgSrc = hk.avatar || 'https://ui-avatars.com/api/?name=U&background=f0f4f8&color=3d5a6c';

            div.innerHTML = '<input type="checkbox" id="hk_' + hk.id + '" value="' + hk.id + '" class="rounded border-gray-300 text-brand focus:ring-brand w-4 h-4 hk-checkbox pointer-events-none" ' + disabledAttr + ' ' + checkedAttr + '>' +

    function saveShift() {
        var shiftId = document.getElementById('modalShiftId').value;
        var clientId = document.getElementById('modalClient').value;
        var startDateStr = document.getElementById('modalDate').value;
        var start = document.getElementById('modalStart').value;
        var end = document.getElementById('modalEnd').value;
        var status = document.getElementById('modalStatus').value;
        
        var dateTypeEl = document.getElementById('modalDateType');
        var dateType = dateTypeEl ? dateTypeEl.value : 'single';
        if(shiftId) dateType = 'single'; 

        var endDateEl = document.getElementById('modalEndDate');
        var endDateStr = endDateEl && dateType !== 'single' ? endDateEl.value : startDateStr;
        
        var notesEl = document.getElementById('modalNotes');
        var notes = notesEl ? notesEl.value : '';

        var selectedHks = [];
        document.getElementById('modalHkList').querySelectorAll('.hk-checkbox:checked').forEach(function(cb) { selectedHks.push(cb.value); });
        
        if(!clientId || !startDateStr || selectedHks.length === 0) { 
            if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบถ้วน', message: 'กรุณาเลือกไซต์งาน วันที่ และพนักงานอย่างน้อย 1 คน', type: 'warning' }); 
            return; 
        }

        var selectedClient = MOCK_CLIENTS.find(function(c) { return c.id === clientId; });
        var maxReq = selectedClient ? (parseInt(selectedClient.reqStaff) || 1) : 1;
        
        if(selectedHks.length > maxReq) {
            if(typeof showCustomDialog === 'function') {
                showCustomDialog({ title: 'จำนวนพนักงานเกินกำหนด', message: 'ไซต์งานนี้รับพนักงานได้สูงสุด ' + maxReq + ' คนครับ', type: 'warning' });
            }
            return;
        }

        if (dateType === 'single') {
            var allHksForDay = new Set();
            MOCK_SHIFTS.forEach(function(s) {
                if (s.clientId === clientId && s.date === startDateStr && s.id !== shiftId && s.status !== 'cancelled') {
                    if(s.hks) s.hks.forEach(function(hk) { allHksForDay.add(hk); });
                }
            });
            selectedHks.forEach(function(hk) { allHksForDay.add(hk); });

            if(allHksForDay.size > maxReq) {
                if(typeof showCustomDialog === 'function') {
                    showCustomDialog({ title: 'โควต้าพนักงานเต็ม', message: 'รวมกะอื่นๆ ในวันนี้ด้วยแล้ว จะทำให้พนักงานเกิน ' + maxReq + ' คนต่อวันครับ', type: 'warning' });
                }
                return;
            }
        }

        var isSubstitution = false;
        var oldHksArray = [];
        if (shiftId) {
            var oldShift = MOCK_SHIFTS.find(s => s.id === shiftId);
            if (oldShift) {
                oldHksArray = oldShift.hks || [];
                var removedHks = oldHksArray.filter(id => !selectedHks.includes(id));
                var addedHks = selectedHks.filter(id => !oldHksArray.includes(id));
                if (removedHks.length > 0 && addedHks.length > 0) { isSubstitution = true; }
            }
        }

        if (isSubstitution) {
            promptSubstitutionReason(oldHksArray, selectedHks, function(subReason, subNote) {
                proceedSavingShift(shiftId, clientId, startDateStr, start, end, status, dateType, endDateStr, notes, selectedHks, true, subReason, subNote);
            });
        } else {
            proceedSavingShift(shiftId, clientId, startDateStr, start, end, status, dateType, endDateStr, notes, selectedHks, false, '', '');
        }
    }

    function proceedSavingShift(shiftId, clientId, startDateStr, start, end, status, dateType, endDateStr, notes, selectedHks, isSubstitution, subReason, subNote) {
        var actionType = 'CREATE';
        
        if (shiftId) {
            if (status === 'cancelled') actionType = 'CANCEL';
            else if (isSubstitution) {
                actionType = 'SUBSTITUTE';
                status = 'confirmed'; 
                var subText = "[เปลี่ยนตัว: " + subReason + "]";
                if (subNote) subText += " หมายเหตุ: " + subNote;
                notes = notes ? (subText + "\n" + notes) : subText;
            }
            else if (status === 'completed') actionType = 'COMPLETED';
            else if (status === 'confirmed') actionType = 'CONFIRMED';
            else actionType = 'UPDATE';
        }

        var timeToMins = function(t) { if(!t) return 0; var p = t.split(':'); return parseInt(p[0]) * 60 + parseInt(p[1]); };
        var newStartMins = timeToMins(start);
        var newEndMins = timeToMins(end) < newStartMins ? timeToMins(end) + 1440 : timeToMins(end);

        var newShifts = [];
        var groupId = shiftId ? (MOCK_SHIFTS.find(s => s.id === shiftId)?.groupId || '') : 'GRP-' + new Date().getTime(); 
        var hasConflict = false;
        var conflictErrors = [];

        if (dateType === 'single' || !endDateStr) {
            MOCK_SHIFTS.forEach(function(exShift) {
                if (exShift.date === startDateStr && exShift.status !== 'cancelled' && exShift.id !== shiftId) {
                    var exStartMins = timeToMins(exShift.start);
                    var exEndMins = timeToMins(exShift.end) < exStartMins ? timeToMins(exShift.end) + 1440 : timeToMins(exShift.end);

                    if (Math.max(newStartMins, exStartMins) < Math.min(newEndMins, exEndMins)) {
                        var overlappingHks = selectedHks.filter(function(hk) { return exShift.hks.includes(hk); });
                        if (overlappingHks.length > 0) {
                            hasConflict = true;
                            var hkNames = overlappingHks.map(function(id) {
                                var h = MOCK_HOUSEKEEPERS.find(function(x) { return x.id === id; }); return h ? h.name : id;
                            }).join(', ');
                            conflictErrors.push('วันที่ ' + startDateStr + ' (' + start + '-' + end + '): ' + hkNames);
                        }
                    }
                }
            });

            if (!hasConflict) {
                newShifts.push({
                    id: shiftId || 'SH-' + new Date().getTime() + '-0',
                    clientId: clientId, date: startDateStr, start: start, end: end, hks: selectedHks, status: status, notes: notes, groupId: groupId,
                    actionBy: CURRENT_USER ? CURRENT_USER.email : 'Unknown', actionType: actionType
                });
            }
        } else {
            var startDt = new Date(startDateStr);
            var endDt = new Date(endDateStr);
            if (endDt < startDt) { if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ถูกต้อง', message: 'วันที่สิ้นสุดต้องมากกว่าหรือเท่ากับวันที่เริ่มต้น', type: 'warning' }); return; }

            var selectedDays = [];
            if (dateType === 'weekly') {
                document.querySelectorAll('.modal-day-cb:checked').forEach(function(cb) { selectedDays.push(parseInt(cb.value)); });
                if (selectedDays.length === 0) { if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบถ้วน', message: 'กรุณาเลือกวันในสัปดาห์อย่างน้อย 1 วัน', type: 'warning' }); return; }
            }

            var currDt = new Date(startDt);
            var count = 0;
            
            while (currDt <= endDt && count < 365) {
                var isMatch = false;
                if (dateType === 'range') isMatch = true;
                else if (dateType === 'weekly' && selectedDays.includes(currDt.getDay())) isMatch = true; 

                if (isMatch) {
                    var dateString = typeof formatDateString === 'function' ? formatDateString(currDt) : currDt.toISOString().split('T')[0];
                    var idToUse = (count === 0 && shiftId) ? shiftId : 'SH-' + new Date().getTime() + '-' + count;
                    
                    MOCK_SHIFTS.forEach(function(exShift) {
                        if (exShift.date === dateString && exShift.status !== 'cancelled' && exShift.id !== idToUse && exShift.id !== shiftId) {
                            var exStartMins = timeToMins(exShift.start);
                            var exEndMins = timeToMins(exShift.end) < exStartMins ? timeToMins(exShift.end) + 1440 : timeToMins(exShift.end);

                            if (Math.max(newStartMins, exStartMins) < Math.min(newEndMins, exEndMins)) {
                                var overlappingHks = selectedHks.filter(function(hk) { return exShift.hks.includes(hk); });
                                if (overlappingHks.length > 0) {
                                    hasConflict = true;
                                    var hkNames = overlappingHks.map(function(id) {
                                        var h = MOCK_HOUSEKEEPERS.find(function(x) { return x.id === id; }); return h ? h.name : id;
                                    }).join(', ');
                                    var errMsg = 'วันที่ ' + dateString + ' (' + start + '-' + end + '): ' + hkNames;
                                    if(!conflictErrors.includes(errMsg)) conflictErrors.push(errMsg);
                                }
                            }
                        }
                    });

                    newShifts.push({
                        id: idToUse, clientId: clientId, date: dateString, start: start, end: end, hks: selectedHks, status: status, notes: notes, groupId: groupId,
                        actionBy: CURRENT_USER ? CURRENT_USER.email : 'Unknown', actionType: actionType
                    });
                }
                currDt.setDate(currDt.getDate() + 1);
                count++;
            }
        }

        if (hasConflict) {
            var displayErrors = conflictErrors.slice(0, 5).join('\n- ');
            if (conflictErrors.length > 5) displayErrors += '\n... และวันอื่นๆ อีก ' + (conflictErrors.length - 5) + ' รายการ';
            if(typeof showCustomDialog === 'function') {
                showCustomDialog({ title: 'พบกะงานทับซ้อน! (ไม่อนุญาตให้บันทึก)', message: 'แม่บ้านมีคิวงานอื่นอยู่แล้วในวันและเวลาที่ท่านเลือก:\n\n- ' + displayErrors + '\n\n*กรุณาเปลี่ยนเวลา หรือถอดรายชื่อแม่บ้านที่ทับซ้อนออก', type: 'delete' });
            } else alert("พบกะงานทับซ้อน!\n" + displayErrors);
            return; 
        }

        if (newShifts.length === 0) { if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ไม่พบวันทำงาน', message: 'ไม่มีวันทำงานที่ตรงกับเงื่อนไขที่เลือก\n(อาจไม่ได้เลือกวันในสัปดาห์ให้ตรงกับช่วงวันที่ระบุ)', type: 'warning' }); return; }

        newShifts.forEach(function(shiftData) {
            var idx = MOCK_SHIFTS.findIndex(function(s) { return s.id === shiftData.id; }); 
            if(idx > -1) { MOCK_SHIFTS[idx] = shiftData; } else { MOCK_SHIFTS.push(shiftData); }
        });
        
        if (typeof google !== 'undefined' && google.script && google.script.run) { 
            var saveBtn = document.querySelector('#shiftModal button[onclick="saveShift()"]');
            var originalText = saveBtn ? saveBtn.innerHTML : '';
            if(saveBtn) { saveBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> บันทึก...'; saveBtn.disabled = true; }

            google.script.run
                .withSuccessHandler(function(res) {
                    if(saveBtn) { saveBtn.innerHTML = originalText; saveBtn.disabled = false; }
                    closeModal('shiftModal'); filterGridData(); showToast(res.message);
                    sendSlackNotification(actionType, newShifts);
                })
                .withFailureHandler(function(err) {
                    if(saveBtn) { saveBtn.innerHTML = originalText; saveBtn.disabled = false; }
                    if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'บันทึกล้มเหลว', message: String(err), type: 'delete' });
                })
                .saveMultipleShiftsToBackend(newShifts);
        } else {
            closeModal('shiftModal'); filterGridData(); showToast("บันทึกตารางงานสำเร็จ (Mock)");
            sendSlackNotification(actionType, newShifts);
        }
    }

    function renderShiftHistory(logs) {
        var container = document.getElementById('shiftHistoryContainer');
        if (!container) return;

        if (!logs || logs.length === 0) {
            container.innerHTML = '<label class="block text-[13px] font-bold text-gray-600 mb-2">ประวัติการจัดการ</label><div class="text-center text-gray-400 text-[11px] py-3 bg-white rounded-lg border border-gray-100 italic">- ไม่มีประวัติการแก้ไข -</div>';
            return;
        }

        var html = '<label class="block text-[13px] font-bold text-gray-600 mb-4">ประวัติการจัดการ (Timeline)</label>';
        html += '<div class="relative border-l-2 border-gray-200 ml-3 mt-1 mb-2">';
        
        logs.forEach(function(log) {
            var d = new Date(log.timestamp);
            var dateStr = d.toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'2-digit'}) + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
            
            var actionColor = 'bg-blue-400'; var actionIcon = 'fa-pen'; var actionText = 'แก้ไขกะงาน';

            if(log.action === 'CREATE') { actionColor = 'bg-green-400'; actionIcon = 'fa-plus'; actionText = 'สร้างกะงานใหม่'; }
            else if(log.action === 'DELETE') { actionColor = 'bg-red-400'; actionIcon = 'fa-trash'; actionText = 'ลบกะงาน'; }
            else if(log.action === 'SUBSTITUTE') { actionColor = 'bg-orange-400'; actionIcon = 'fa-users-arrows-right'; actionText = 'เปลี่ยนตัวแม่บ้าน'; }
            else if(log.action === 'CANCEL') { actionColor = 'bg-gray-400'; actionIcon = 'fa-xmark'; actionText = 'ยกเลิกกะงาน'; }
            else if(log.action === 'COMPLETED') { actionColor = 'bg-emerald-500'; actionIcon = 'fa-check-double'; actionText = 'สถานะ: เสร็จสมบูรณ์'; }
            else if(log.action === 'CONFIRMED') { actionColor = 'bg-blue-600'; actionIcon = 'fa-circle-check'; actionText = 'สถานะ: ยืนยันแล้ว'; }

            var userEmail = log.user_email ? log.user_email.split('@')[0] : 'System';
            
            var detailHtml = '';
            if (log.old_data && log.new_data) {
                try {
                    var oldD = JSON.parse(log.old_data);
                    var newD = JSON.parse(log.new_data);
                    var changes = [];

                    var parseOldTime = function(val) {
                        if(!val) return '?';
                        val = String(val);
                        if(val.includes('1899') && val.includes('T')) {
                            var dt = new Date(val);
                            if(!isNaN(dt.getTime())) {
                                return String(dt.getHours()).padStart(2, '0') + ':' + String(dt.getMinutes()).padStart(2, '0');
                            }
                        }
                        return val;
                    };

                    var parseOldDate = function(val) {
                        if(!val) return '?';
                        val = String(val);
                        if(val.includes('T')) val = val.split('T')[0];
                        var parts = val.split('-');
                        if(parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
                        return val;
                    };

                    if (oldD.client_id !== newD.clientId) {
                        var oldClient = MOCK_CLIENTS.find(c => c.id === oldD.client_id) || {name: oldD.client_id};
                        var newClient = MOCK_CLIENTS.find(c => c.id === newD.clientId) || {name: newD.clientId};
                        changes.push('ไซต์งาน: ' + oldClient.name + ' ➡️ <span class="font-bold text-brand">' + newClient.name + '</span>');
                    }

                    var oDateStr = parseOldDate(oldD.date);
                    var nDateStr = parseOldDate(newD.date);
                    if (oldD.date !== newD.date) {
                        changes.push('วันที่: ' + (oDateStr||'?') + ' ➡️ <span class="font-bold text-brand">' + nDateStr + '</span>');
                    }

                    var oStart = parseOldTime(oldD.start_time);
                    var oEnd = parseOldTime(oldD.end_time);
                    if (oStart !== newD.start || oEnd !== newD.end) {
                        changes.push('เวลา: ' + oStart + '-' + oEnd + ' ➡️ <span class="font-bold text-gray-700">' + newD.start + '-' + newD.end + '</span>');
                    }
                    
                    var oldHksStr = oldD.assigned_hk_ids || '';
                    var newHksStr = (newD.hks || []).join(', ');
                    if (oldHksStr !== newHksStr) {
                        var getNames = (str) => {
                            if(!str) return 'ไม่มี';
                            return str.split(',').map(id => { 
                                var h = MOCK_HOUSEKEEPERS.find(x => x.id === id.trim()); 
                                return h ? (h.nickname || h.name.split(' ')[0]) : id; 
                            }).join(', ');
                        };
                        changes.push('พนักงาน: ' + getNames(oldHksStr) + ' ➡️ <span class="font-bold text-orange-600">' + getNames(newHksStr) + '</span>');
                    }

                    if (oldD.notes !== newD.notes && newD.notes) {
                        changes.push('หมายเหตุ: <span class="font-bold text-gray-700">"' + newD.notes + '"</span>');
                    }

                    if (changes.length > 0) {
                        detailHtml = '<ul class="list-disc list-inside text-[10px] text-gray-500 mt-1.5 ml-1 space-y-0.5">' + 
                                     changes.map(c => '<li>' + c + '</li>').join('') + 
                                     '</ul>';
                    }
                } catch(e) {}
            }

            html += '<div class="mb-5 ml-5 relative">' +
                        '<div class="absolute w-6 h-6 ' + actionColor + ' rounded-full -left-[33px] top-[-2px] flex items-center justify-center text-white border-[3px] border-[#f8fafb] shadow-sm">' +
                            '<i class="fa-solid ' + actionIcon + ' text-[9px]"></i>' +
                        '</div>' +
                        '<p class="text-[10px] text-gray-400 mb-0.5 leading-tight">' + dateStr + '</p>' +
                        '<p class="text-[12px] font-bold text-gray-800 leading-tight">' + actionText + ' <span class="font-medium text-gray-500 text-[11px] ml-1">โดย ' + userEmail + '</span></p>' +
                        detailHtml +
                    '</div>';
        });
        
        html += '</div>';
        container.innerHTML = html;
    }

        var modal = document.getElementById('staffModal'); 
        if(modal) modal.classList.remove('hidden');
    }

    function openUserModal() {
        setInputValue('userId', ''); 
        setInputValue('userName', ''); 
        setInputValue('userEmail', ''); 
        setInputValue('userRole', 'Viewer'); 
        setInputValue('userStatus', 'Active');
        
        var modal = document.getElementById('userModal');
        if(modal) modal.classList.remove('hidden');
    }
    
    function editUser(id) {
        var u = MOCK_USERS.find(function(x) { return x.id === id; }); 
        if(!u) return;
        
        setInputValue('userId', u.id); 
        setInputValue('userName', u.name); 
        setInputValue('userEmail', u.email); 
        setInputValue('userRole', u.role); 
        setInputValue('userStatus', u.status);
        
        var modal = document.getElementById('userModal');
        if(modal) modal.classList.remove('hidden');
    }

    function initModalForms() {
        var clientSelect = document.getElementById('modalClient');
        if (clientSelect) { 
            clientSelect.innerHTML = '<option value="">-- เลือกสถานที่ --</option>'; 
            MOCK_CLIENTS.forEach(function(c) { 
                var opt = document.createElement('option'); 
                opt.value = c.id; 
                opt.text = c.name; 
                clientSelect.appendChild(opt); 
            });
            if (window.jQuery && $.fn.select2) $('#modalClient').trigger('change.select2');
        }
    }
</script>
