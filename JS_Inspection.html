<!-- ============================================== -->
<!-- MODALS สำหรับระบบแผนตรวจงาน (INSPECTION) -->
<!-- ============================================== -->

<!-- 1. Modal: มอบหมายแผนตรวจงานให้ AE (AE Plan Modal) -->
<div id="aePlanModal" class="fixed inset-0 bg-gray-900 bg-opacity-40 z-[100] hidden flex items-center justify-center backdrop-blur-[2px] transition-opacity">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col transform transition-transform">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white shrink-0">
            <h3 class="text-lg font-black text-brand"><i class="fa-solid fa-calendar-plus mr-2 text-green-500"></i>มอบหมายงานตรวจคุณภาพ</h3>
            <button onclick="closeModal('aePlanModal')" class="text-gray-400 hover:text-gray-800 w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        
        <div class="p-6 flex flex-col gap-4">
            <input type="hidden" id="planId">
            
            <div class="bg-blue-50/50 border border-blue-100 rounded-lg p-3">
                <div class="flex flex-col gap-1">
                    <span class="text-[11px] font-bold text-gray-500 uppercase tracking-widest">สถานที่ตรวจ (Client)</span>
                    <span class="text-[14px] font-black text-brand" id="planClientName">ชื่อไซต์งาน</span>
                    <input type="hidden" id="planClientId">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[12px] font-bold text-gray-600 mb-1">วันที่เข้าตรวจ <span class="text-red-500">*</span></label>
                    <input type="date" id="planDate" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-medium outline-none focus:border-brand transition shadow-sm">
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-gray-600 mb-1">สถานะ</label>
                    <select id="planStatus" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-medium outline-none focus:border-brand transition shadow-sm">
                        <option value="Pending">รอดำเนินการ (Pending)</option>
                        <option value="Completed" disabled>ตรวจแล้ว (Completed)</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-[12px] font-bold text-gray-600 mb-1">ผู้ตรวจงาน (AE / Supervisor) <span class="text-red-500">*</span></label>
                <select id="planAeEmail" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-medium outline-none focus:border-brand transition shadow-sm">
                    <!-- จะถูกเติมตัวเลือกจาก MOCK_USERS ที่มี Role เป็น AE หรือ Admin -->
                </select>
            </div>

            <div>
                <label class="block text-[12px] font-bold text-gray-600 mb-1">หมายเหตุสั่งงาน (Optional)</label>
                <textarea id="planNotes" rows="2" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-medium outline-none focus:border-brand transition shadow-sm" placeholder="เน้นย้ำจุดที่ต้องตรวจเป็นพิเศษ..."></textarea>
            </div>
        </div>
        
        <div class="px-6 py-4 border-t border-gray-100 flex justify-between bg-gray-50 shrink-0">
            <button id="btnDeletePlan" onclick="deleteAEPlan()" class="px-4 py-2 bg-red-50 text-red-600 hover:bg-red-100 rounded-md text-[13px] font-bold transition hidden"><i class="fa-solid fa-trash-can mr-1"></i> ลบแผน</button>
            <div class="flex gap-2 ml-auto">
                <button onclick="closeModal('aePlanModal')" class="px-4 py-2 bg-white border border-gray-300 text-gray-600 rounded-md text-[13px] font-bold hover:bg-gray-50 transition">ยกเลิก</button>
                <button onclick="saveAEPlan(event)" class="px-6 py-2 bg-green-500 text-white rounded-md text-[13px] font-bold hover:bg-green-600 shadow-sm transition transform hover:-translate-y-0.5">บันทึกคิวตรวจ</button>
            </div>
        </div>
    </div>
</div>

<!-- 2. Modal: รายงานการตรวจ (Inspection Report Print View) -->
<div id="reportPrintModal" class="fixed inset-0 bg-gray-900 bg-opacity-70 z-[200] hidden flex flex-col items-center backdrop-blur-[2px] transition-opacity p-4 md:p-10">
    <div class="w-full max-w-4xl flex justify-between items-center mb-4 shrink-0 bg-white p-3 rounded-xl shadow-lg">
        <h3 class="text-base font-black text-brand"><i class="fa-solid fa-file-pdf mr-2 text-red-500"></i> รายงานการตรวจคุณภาพ (Inspection Report)</h3>
        <div class="flex gap-2">
            <button onclick="printReportContent()" class="px-4 py-2 bg-brand text-white rounded-md text-[12px] font-bold hover:bg-brandDark transition shadow-sm flex items-center gap-2"><i class="fa-solid fa-print"></i> พิมพ์ / PDF</button>
            <button onclick="closeModal('reportPrintModal')" class="w-9 h-9 flex items-center justify-center rounded-md bg-gray-100 text-gray-600 hover:bg-gray-200 transition"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>
    
    <!-- Printable A4 Area -->
    <div id="printableReportArea" class="w-full max-w-4xl bg-white shadow-2xl rounded-sm flex-grow overflow-y-auto custom-scrollbar relative">
        <div class="p-8 md:p-12" id="reportContentInner">
            <!-- ข้อมูลรายงานจะถูกสร้างจาก JS และใส่ตรงนี้ -->
        </div>
    </div>
</div>


<!-- ============================================== -->
<!-- JAVASCRIPT สำหรับจัดการระบบ INSPECTION -->
<!-- ============================================== -->
<script>
    // 💡 ตัวแปรเก็บเดือนและปีปัจจุบันของหน้าตาราง Matrix
    var inspCurrentDate = new Date();
    
    // ตรวจสอบและประกาศตัวแปร Mock Data หากยังไม่มี
    window.MOCK_AE_PLANS = window.MOCK_AE_PLANS || [];

    // --- ส่วนควบคุม TABS ---
    function switchInspectionTab(tabId) {
        var tabMatrix = document.getElementById('tab-insp-matrix');
        var tabHistory = document.getElementById('tab-insp-history');
        var contentMatrix = document.getElementById('content-insp-matrix');
        var contentHistory = document.getElementById('content-insp-history');

        if (!tabMatrix || !tabHistory) return;

        tabMatrix.className = "px-5 py-2.5 text-[13px] font-bold border-b-[3px] border-transparent text-gray-500 hover:text-gray-800 transition-colors whitespace-nowrap";
        tabHistory.className = "px-5 py-2.5 text-[13px] font-bold border-b-[3px] border-transparent text-gray-500 hover:text-gray-800 transition-colors whitespace-nowrap";
        
        contentMatrix.classList.add('hidden');
        contentHistory.classList.add('hidden');

        if (tabId === 'matrix') {
            tabMatrix.className = "px-5 py-2.5 text-[13px] font-bold border-b-[3px] border-brand text-brand transition-colors whitespace-nowrap";
            contentMatrix.classList.remove('hidden');
            contentMatrix.classList.add('flex');
            renderInspectionMatrix();
        } else if (tabId === 'history') {
            tabHistory.className = "px-5 py-2.5 text-[13px] font-bold border-b-[3px] border-brand text-brand transition-colors whitespace-nowrap";
            contentHistory.classList.remove('hidden');
            contentHistory.classList.add('flex');
            renderInspectionHistoryTable();
        }
    }

    // --- ส่วนควบคุมปฏิทิน Matrix ---
    function initInspectionView() {
        var picker = document.getElementById('inspectionMonthPicker');
        if (picker) {
            picker.value = inspCurrentDate.getFullYear() + '-' + String(inspCurrentDate.getMonth() + 1).padStart(2, '0');
        }
        renderInspectionMatrix();
    }

    function changeInspectionMonth(offset) {
        inspCurrentDate.setMonth(inspCurrentDate.getMonth() + offset);
        var picker = document.getElementById('inspectionMonthPicker');
        if (picker) {
            picker.value = inspCurrentDate.getFullYear() + '-' + String(inspCurrentDate.getMonth() + 1).padStart(2, '0');
        }
        renderInspectionMatrix();
    }

    function setInspectionMonthFromPicker(val) {
        if (!val) return;
        var parts = val.split('-');
        if (parts.length === 2) {
            inspCurrentDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, 1);
            renderInspectionMatrix();
        }
    }

    // --- ส่วนแสดงผลตาราง Matrix ---
    function renderInspectionMatrix() {
        var container = document.getElementById('inspectionTableContainer');
        if (!container) return;

        var year = inspCurrentDate.getFullYear();
        var month = inspCurrentDate.getMonth();
        var daysInMonth = new Date(year, month + 1, 0).getDate();
        
        var monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        var dayNames = ["อา", "จ", "อ", "พ", "พฤ", "ศ", "ส"];

        var currentMonthStr = String(month + 1).padStart(2, '0');
        var yearMonthPrefix = year + '-' + currentMonthStr + '-';

        // 1. สร้างส่วนหัวตาราง (Header)
        var html = '<table class="w-full text-left border-collapse min-w-max bg-white shadow-sm">';
        html += '<thead class="sticky top-0 z-20">';
        
        // แถวชื่อเดือน
        html += '<tr>';
        html += '<th colspan="5" class="p-0 border-r border-gray-200 bg-brandDark"></th>';
        html += '<th colspan="' + daysInMonth + '" class="py-2 px-3 text-center bg-brandDark text-white text-[13px] font-bold border-b border-white/20">' + monthNames[month] + ' ' + (year + 543) + '</th>';
        html += '</tr>';

        // แถวหัวข้อคอลัมน์และวันที่
        html += '<tr>';
        html += '<th class="py-3 px-4 bg-brandDark text-white text-[11px] font-bold text-center border-r border-white/20 sticky left-0 z-30 min-w-[180px]">ไซต์งาน</th>';
        html += '<th class="py-3 px-3 bg-brand text-white/90 text-[10px] font-medium text-center border-r border-white/20 min-w-[100px]">วันเข้าบริการ</th>';
        html += '<th class="py-3 px-3 bg-brand text-white/90 text-[10px] font-medium text-center border-r border-white/20 min-w-[100px]">ความถี่ / เดือน</th>';
        html += '<th class="py-3 px-3 bg-brand text-white/90 text-[10px] font-medium text-center border-r border-white/20 min-w-[100px]">วันที่เริ่มสัญญา</th>';
        html += '<th class="py-3 px-3 bg-brand text-white/90 text-[10px] font-medium text-center border-r border-white/20 min-w-[100px]">วันที่สิ้นสุด</th>';

        for (var i = 1; i <= daysInMonth; i++) {
            var d = new Date(year, month, i);
            var dayStr = dayNames[d.getDay()];
            var isWeekend = (d.getDay() === 0 || d.getDay() === 6);
            var thClass = isWeekend ? "bg-red-50 text-red-500" : "bg-white text-gray-600";
            
            html += '<th class="py-1 px-0 border border-gray-200 text-center ' + thClass + ' w-[32px] min-w-[32px] max-w-[32px]">';
            html += '<div class="text-[9px] font-bold leading-tight">' + dayStr + '</div>';
            html += '<div class="text-[12px] font-black leading-tight">' + String(i).padStart(2, '0') + '</div>';
            html += '</th>';
        }
        html += '</tr></thead><tbody>';

        // 2. กรองเฉพาะลูกค้า B2B และ B2C ที่เปิดใช้งาน
        var activeClients = MOCK_CLIENTS.filter(function(c) { return c.type !== 'system' && c.status === 'Active'; });
        
        if (activeClients.length === 0) {
            html += '<tr><td colspan="' + (5 + daysInMonth) + '" class="text-center py-10 text-gray-400 italic">ไม่มีข้อมูลไซต์งานที่กำลังให้บริการ</td></tr>';
        }

        // 3. วนลูปสร้างแถวของแต่ละลูกค้า
        activeClients.forEach(function(client) {
            var colorBar = '<div class="absolute left-0 top-0 bottom-0 w-1.5" style="background-color: ' + (client.color || '#cbd5e1') + '"></div>';
            
            html += '<tr class="hover:bg-gray-50 transition-colors border-b border-gray-200">';
            html += '<td class="py-3 px-4 relative bg-white sticky left-0 z-10 border-r border-gray-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">' + colorBar + '<span class="font-bold text-[12px] text-gray-900 ml-1 truncate block max-w-[160px]" title="' + client.name + '">' + client.name + '</span></td>';
            html += '<td class="py-3 px-2 text-center text-[11px] text-gray-600 border-r border-gray-200">' + (client.serviceDays || '-') + '</td>';
            html += '<td class="py-3 px-2 text-center text-[11px] text-gray-600 border-r border-gray-200">' + (client.frequency || '-') + '</td>';
            
            // Format Contract Dates
            var formatDt = function(dStr) {
                if(!dStr) return '-';
                try { var dt = new Date(dStr); return String(dt.getDate()).padStart(2, '0') + '/' + String(dt.getMonth() + 1).padStart(2, '0') + '/' + String(dt.getFullYear()).slice(-2); } 
                catch(e) { return dStr; }
            };
            html += '<td class="py-3 px-2 text-center text-[11px] text-gray-600 border-r border-gray-200">' + formatDt(client.startDate) + '</td>';
            html += '<td class="py-3 px-2 text-center text-[11px] text-gray-600 border-r border-gray-200">' + formatDt(client.endDate) + '</td>';

            // เตรียมข้อมูลประกอบการลงจุด (Shifts, AE Plans, Inspections)
            var shiftsByDate = {};
            MOCK_SHIFTS.forEach(function(s) {
                if (s.clientId === client.id && s.date.startsWith(yearMonthPrefix) && s.status !== 'cancelled') {
                    if(!shiftsByDate[s.date]) shiftsByDate[s.date] = 0;
                    if(s.hks && s.hks.length > 0) shiftsByDate[s.date] += s.hks.length;
                }
            });

            var plansByDate = {};
            if(window.MOCK_AE_PLANS) {
                window.MOCK_AE_PLANS.forEach(function(p) {
                    if (p.clientId === client.id && p.date && p.date.startsWith(yearMonthPrefix)) {
                        plansByDate[p.date] = p;
                    }
                });
            }

            var inspectionsByDate = {};
            if(window.MOCK_INSPECTIONS) {
                window.MOCK_INSPECTIONS.forEach(function(i) {
                    if (i.clientId === client.id && i.date && i.date.startsWith(yearMonthPrefix)) {
                        inspectionsByDate[i.date] = i;
                    }
                });
            }

            // 4. วนลูปวาดช่องตารางในแต่ละวัน (1 - 31)
            for (var i = 1; i <= daysInMonth; i++) {
                var currentDateStr = yearMonthPrefix + String(i).padStart(2, '0');
                
                var cellClasses = ["border-r", "border-gray-200", "p-0", "relative", "h-[36px]", "hover:bg-gray-100", "cursor-pointer", "transition"];
                var innerHtml = '';
                var isStart = client.startDate === currentDateStr;
                var isEnd = client.endDate === currentDateStr;

                if (isStart) innerHtml += '<div class="absolute inset-0 bg-orange-400 opacity-20 pointer-events-none"></div>';
                if (isEnd) innerHtml += '<div class="absolute inset-0 bg-red-500 opacity-20 pointer-events-none"></div>';

                var hasPlan = plansByDate[currentDateStr];
                var hasInsp = inspectionsByDate[currentDateStr];
                var shiftCount = shiftsByDate[currentDateStr];

                // จัดเรียง Icon/Badge ให้อยู่กึ่งกลางเซลล์
                var iconsHtml = '<div class="w-full h-full flex items-center justify-center pointer-events-none z-10 relative">';
                
                if (hasInsp) {
                    // มีรายงานแล้ว โชว์ไอคอนรายงาน
                    iconsHtml += '<i class="fa-solid fa-file-circle-check text-brand text-[14px]"></i>';
                } else if (hasPlan) {
                    // มีแผนตรวจงาน โชว์กล่องเขียว
                    var pColor = hasPlan.status === 'Completed' ? 'bg-brand' : 'bg-green-500';
                    iconsHtml += '<div class="w-4 h-4 ' + pColor + ' rounded-sm shadow-sm flex items-center justify-center text-white text-[8px] font-bold" title="AE: ' + hasPlan.aeEmail + '"><i class="fa-solid fa-user-check"></i></div>';
                } else if (shiftCount && shiftCount > 0) {
                    // ไม่มีแผนตรวจ แต่มีแม่บ้านลงคิวไว้ โชว์ตัวเลข
                    iconsHtml += '<div class="text-[10px] font-black text-gray-400">' + shiftCount + '</div>';
                }
                
                iconsHtml += '</div>';
                innerHtml += iconsHtml;

                // 💡 เพิ่ม Onclick เพื่อเปิด Modal จัดคิว AE
                var onclickAttr = 'onclick="openAEPlanModal(\'' + client.id + '\', \'' + currentDateStr + '\', \'' + (hasPlan ? hasPlan.id : '') + '\')"';

                html += '<td class="' + cellClasses.join(' ') + '" ' + onclickAttr + ' title="กดเพื่อเพิ่ม/แก้ไขแผนเข้าตรวจงาน">' + innerHtml + '</td>';
            }

            html += '</tr>';
        });

        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // --- ส่วนจัดการ AE Plan Modal ---
    function openAEPlanModal(clientId, dateStr, planId) {
        var client = MOCK_CLIENTS.find(function(c) { return c.id === clientId; });
        if(!client) return;

        // ดึงรายชื่อ User ที่เป็น AE / Admin มาใส่ Dropdown
        var aeSelect = document.getElementById('planAeEmail');
        if(aeSelect) {
            aeSelect.innerHTML = '<option value="">-- เลือกผู้ตรวจงาน --</option>';
            MOCK_USERS.forEach(function(u) {
                if (u.status === 'Active' && (u.role.includes('AE') || u.role.includes('Admin') || u.role.includes('Supervisor'))) {
                    var opt = document.createElement('option');
                    opt.value = u.email;
                    opt.text = u.name + ' (' + u.role + ')';
                    aeSelect.appendChild(opt);
                }
            });
        }

        setInputValue('planId', planId || '');
        setInputValue('planClientId', clientId);
        setInputValue('planDate', dateStr);
        document.getElementById('planClientName').innerText = client.name;
        
        var btnDel = document.getElementById('btnDeletePlan');

        if (planId && window.MOCK_AE_PLANS) {
            // โหมดแก้ไขแผนเดิม
            var plan = window.MOCK_AE_PLANS.find(function(p) { return p.id === planId; });
            if (plan) {
                setInputValue('planAeEmail', plan.aeEmail);
                setInputValue('planStatus', plan.status);
                setInputValue('planNotes', plan.notes || '');
                if(btnDel) btnDel.classList.remove('hidden');
            }
        } else {
            // โหมดสร้างแผนใหม่
            setInputValue('planAeEmail', '');
            setInputValue('planStatus', 'Pending');
            setInputValue('planNotes', '');
            if(btnDel) btnDel.classList.add('hidden');
        }

        var modal = document.getElementById('aePlanModal');
        if(modal) modal.classList.remove('hidden');
    }

    function saveAEPlan(event) {
        var id = document.getElementById('planId').value;
        var clientId = document.getElementById('planClientId').value;
        var dateStr = document.getElementById('planDate').value;
        var aeEmail = document.getElementById('planAeEmail').value;
        var status = document.getElementById('planStatus').value;
        var notes = document.getElementById('planNotes').value;

        if (!clientId || !dateStr || !aeEmail) {
            if(typeof showCustomDialog === 'function') showCustomDialog({ title: 'ข้อมูลไม่ครบ', message: 'กรุณาเลือกผู้ตรวจงานและวันที่ให้ครบถ้วน', type: 'warning' });
            return;
        }

        var planData = {
            id: id || 'AEP-' + new Date().getTime(),
            clientId: clientId,
            date: dateStr,
            aeEmail: aeEmail,
            status: status,
            notes: notes,
            actionBy: CURRENT_USER ? CURRENT_USER.email : 'System'
        };

        var idx = window.MOCK_AE_PLANS.findIndex(function(p) { return p.id === planData.id; });
        if(idx > -1) { window.MOCK_AE_PLANS[idx] = planData; } else { window.MOCK_AE_PLANS.push(planData); }

        var btn = event && event.target ? event.target : null;
        var originalText = btn ? btn.innerHTML : '';
        if(btn) { btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> บันทึก...'; btn.disabled = true; }

        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run
                .withSuccessHandler(function(res) {
                    if(btn) { btn.innerHTML = originalText; btn.disabled = false; }
                    closeModal('aePlanModal');
                    renderInspectionMatrix();
                    showToast(res.message);
                })
                .withFailureHandler(function(err) {
                    if(btn) { btn.innerHTML = originalText; btn.disabled = false; }
                    showCustomDialog({ title: 'ข้อผิดพลาด', message: String(err), type: 'warning' });
                })
                .saveAEPlanToBackend(planData);
        } else {
            setTimeout(function() {
                if(btn) { btn.innerHTML = originalText; btn.disabled = false; }
                closeModal('aePlanModal');
                renderInspectionMatrix();
                showToast('บันทึกแผนตรวจงานสำเร็จ (Mock)');
            }, 500);
        }
    }

    function deleteAEPlan() {
        var id = document.getElementById('planId').value;
        if(!id) return;

        showCustomDialog({
            title: 'ยืนยันการยกเลิกคิว',
            message: 'คุณต้องการยกเลิกคิวตรวจงานของ AE ในวันนี้ใช่หรือไม่?',
            type: 'delete',
            buttons: [
                { text: 'ไม่', style: 'cancel' },
                { text: 'ยืนยันยกเลิก', style: 'danger', action: function() {
                    window.MOCK_AE_PLANS = window.MOCK_AE_PLANS.filter(function(p) { return p.id !== id; });
                    
                    if (typeof google !== 'undefined' && google.script && google.script.run) {
                        google.script.run
                            .withSuccessHandler(function(res) {
                                closeModal('aePlanModal');
                                renderInspectionMatrix();
                                showToast(res.message);
                            })
                            .deleteAEPlanToBackend(id);
                    } else {
                        closeModal('aePlanModal');
                        renderInspectionMatrix();
                        showToast('ลบแผนตรวจงานสำเร็จ (Mock)');
                    }
                }}
            ]
        });
    }

    // --- ส่วนแสดงผลตารางประวัติรายงาน (History) ---
    function renderInspectionHistoryTable() {
        var tbody = document.getElementById('inspectionHistoryTableBody');
        if (!tbody) return;

        var keyword = '';
        var searchInput = document.getElementById('inspHistorySearch');
        if (searchInput) keyword = searchInput.value.toLowerCase();

        if (!window.MOCK_INSPECTIONS || window.MOCK_INSPECTIONS.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-gray-400 font-medium">ยังไม่มีประวัติรายงานการตรวจ</td></tr>';
            return;
        }

        var filtered = window.MOCK_INSPECTIONS.filter(function(ins) {
            var client = MOCK_CLIENTS.find(function(c){ return c.id === ins.clientId; }) || { name: ins.clientId };
            var ae = MOCK_USERS.find(function(u){ return u.id === ins.aeId || u.email === ins.aeId; }) || { name: ins.aeId };
            
            if (keyword) {
                if (!client.name.toLowerCase().includes(keyword) && !ae.name.toLowerCase().includes(keyword)) return false;
            }
            return true;
        });

        filtered.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-gray-400 font-medium">ไม่พบข้อมูลที่ค้นหา</td></tr>';
            return;
        }

        var html = '';
        filtered.forEach(function(ins) {
            var client = MOCK_CLIENTS.find(function(c){ return c.id === ins.clientId; }) || { name: 'ไม่พบชื่อไซต์งาน' };
            var ae = MOCK_USERS.find(function(u){ return u.id === ins.aeId || u.email === ins.aeId; }) || { name: ins.aeId };
            
            var dateObj = new Date(ins.date);
            var dateStr = String(dateObj.getDate()).padStart(2,'0') + '/' + String(dateObj.getMonth()+1).padStart(2,'0') + '/' + String(dateObj.getFullYear()+543).slice(-2);

            var qColor = 'bg-gray-100 text-gray-600 border-gray-200';
            if(ins.quality === 'ดีมาก') qColor = 'bg-green-100 text-green-700 border-green-200';
            else if(ins.quality === 'ดี') qColor = 'bg-blue-100 text-blue-700 border-blue-200';
            else if(ins.quality === 'ควรปรับปรุง') qColor = 'bg-red-100 text-red-600 border-red-200';

            var issuesCount = 0;
            try {
                var issues = JSON.parse(ins.issues || '[]');
                issuesCount = issues.length;
            } catch(e) {}
            var issuesBadge = issuesCount > 0 ? '<span class="text-red-500 font-bold"><i class="fa-solid fa-triangle-exclamation"></i> พบ ' + issuesCount + ' จุด</span>' : '<span class="text-green-500 font-medium">- ปกติ -</span>';

            html += '<tr class="hover:bg-gray-50/50 transition-colors border-b border-gray-100">';
            html += '<td class="text-center font-bold text-gray-600">' + dateStr + '</td>';
            html += '<td><div class="font-bold text-gray-900 truncate max-w-[250px]">' + client.name + '</div></td>';
            html += '<td><div class="font-medium text-brand flex items-center gap-2"><div class="w-6 h-6 rounded-full bg-brandLight flex items-center justify-center text-[10px] text-brand"><i class="fa-solid fa-user-tie"></i></div> ' + ae.name + '</div></td>';
            html += '<td class="text-center"><span class="px-2.5 py-1 text-[11px] font-bold rounded-md border ' + qColor + '">' + ins.quality + '</span></td>';
            html += '<td class="text-center">' + issuesBadge + '</td>';
            html += '<td class="text-center"><button onclick="printInspectionReport(\'' + ins.id + '\')" class="px-3 py-1.5 bg-white border border-gray-300 text-gray-600 hover:text-brand hover:border-brand rounded-md text-[11px] font-bold transition shadow-sm flex items-center justify-center gap-1.5 mx-auto"><i class="fa-solid fa-print"></i> รายงาน</button></td>';
            html += '</tr>';
        });

        tbody.innerHTML = html;
    }

    // --- ส่วนจำลองการสร้างรายงาน PDF ---
    function printInspectionReport(insId) {
        var ins = window.MOCK_INSPECTIONS.find(function(i){ return i.id === insId; });
        if(!ins) return;

        var client = MOCK_CLIENTS.find(function(c){ return c.id === ins.clientId; }) || { name: 'ไม่พบชื่อไซต์งาน', address: '-' };
        var ae = MOCK_USERS.find(function(u){ return u.id === ins.aeId || u.email === ins.aeId; }) || { name: ins.aeId };

        var dateObj = new Date(ins.date);
        var dateStr = dateObj.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });

        // Parse JSON Data
        var items = []; var issues = [];
        try { items = JSON.parse(ins.checklist || '[]'); } catch(e){}
        try { issues = JSON.parse(ins.issues || '[]'); } catch(e){}

        // สร้าง HTML สำหรับหน้ากระดาษ A4
        var html = `
            <div class="text-center border-b-2 border-gray-800 pb-4 mb-6">
                <img src="https://i.postimg.cc/c4J26FXN/mari-logo-d-text.png" class="h-10 mx-auto mb-2 grayscale">
                <h1 class="text-xl font-black text-gray-900">รายงานการตรวจสอบคุณภาพการให้บริการ (Inspection Report)</h1>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6 text-[13px] border border-gray-300 p-4 rounded-lg bg-gray-50/50">
                <div><span class="font-bold text-gray-600">สถานที่ปฏิบัติงาน:</span> <span class="text-gray-900 font-medium">${client.name}</span></div>
                <div><span class="font-bold text-gray-600">วันที่ตรวจประเมิน:</span> <span class="text-gray-900 font-medium">${dateStr}</span></div>
                <div><span class="font-bold text-gray-600">ผู้ตรวจประเมิน (AE):</span> <span class="text-gray-900 font-medium">${ae.name}</span></div>
                <div><span class="font-bold text-gray-600">คะแนนภาพรวม:</span> <span class="text-gray-900 font-black">${ins.quality}</span></div>
            </div>

            <h3 class="font-bold text-gray-800 text-[14px] border-b border-gray-300 pb-1 mb-3">1. รายการจุดตรวจ (Checklist)</h3>
            <div class="grid grid-cols-2 gap-4 mb-8">
        `;

        if (items.length === 0) html += '<p class="text-gray-400 text-sm italic col-span-2">ไม่มีข้อมูลรูปถ่าย Checklist</p>';
        items.forEach(function(item) {
            var sText = item.status === 'passed' ? '<span class="text-green-600 font-bold">ผ่าน</span>' : '<span class="text-red-600 font-bold">ไม่ผ่าน</span>';
            var imgHtml = item.imgUrl ? `<img src="${item.imgUrl}" class="w-full h-32 object-cover border border-gray-300 rounded">` : `<div class="w-full h-32 bg-gray-100 flex items-center justify-center border border-gray-300 rounded text-gray-400 text-xs">ไม่มีรูปภาพ</div>`;
            html += `
                <div class="border border-gray-200 p-2 rounded break-inside-avoid">
                    <p class="text-[12px] font-bold text-gray-800 mb-1 truncate">${item.name} (${sText})</p>
                    ${imgHtml}
                </div>
            `;
        });

        html += `</div>
            <h3 class="font-bold text-red-600 text-[14px] border-b border-gray-300 pb-1 mb-3">2. ปัญหาที่พบและการแก้ไข (Incident & Action)</h3>
        `;

        if (issues.length === 0) html += '<p class="text-green-600 font-bold text-sm mb-8"><i class="fa-solid fa-check-circle"></i> ไม่พบปัญหาใดๆ ในการตรวจครั้งนี้</p>';
        else {
            html += '<div class="flex flex-col gap-4 mb-8">';
            issues.forEach(function(issue, idx) {
                var bImg = issue.beforeUrl ? `<img src="${issue.beforeUrl}" class="w-full h-32 object-cover border border-gray-300 rounded mt-1">` : '';
                var aImg = issue.afterUrl ? `<img src="${issue.afterUrl}" class="w-full h-32 object-cover border border-gray-300 rounded mt-1">` : '';
                html += `
                    <div class="border border-gray-300 p-3 rounded bg-white break-inside-avoid">
                        <p class="text-[12px] font-bold text-red-600 mb-2">ปัญหาที่ ${idx+1}: <span class="text-gray-800 font-medium">${issue.description || '-'}</span></p>
                        <div class="grid grid-cols-2 gap-4">
                            <div><span class="text-[10px] text-gray-500 font-bold uppercase block">ก่อนแก้ไข (Before)</span>${bImg}</div>
                            <div>
                                <span class="text-[10px] text-green-600 font-bold uppercase block">หลังแก้ไข (After)</span>
                                ${aImg}
                                ${issue.actionTaken ? `<p class="text-[11px] mt-1 text-gray-600">การแก้ไข: ${issue.actionTaken}</p>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
        }

        html += `
            <div class="grid grid-cols-2 gap-8 border-t-2 border-gray-800 pt-6 mt-6 break-inside-avoid">
                <div class="text-[12px]">
                    <p class="font-bold text-gray-800 mb-1">ความคิดเห็นเพิ่มเติม:</p>
                    <p class="text-gray-600 min-h-[60px] p-2 border border-gray-200 bg-gray-50 rounded">${ins.interviewNote || '-'}</p>
                </div>
                <div class="flex flex-col items-center justify-end text-center">
                    ${ins.signatureUrl ? `<img src="${ins.signatureUrl}" class="h-20 object-contain border-b border-gray-400 mb-2 px-8">` : `<div class="h-20 w-48 border-b border-gray-400 mb-2"></div>`}
                    <p class="text-[13px] font-bold text-gray-800">(${ae.name})</p>
                    <p class="text-[11px] text-gray-500">ผู้ตรวจประเมินคุณภาพ</p>
                </div>
            </div>
        `;

        document.getElementById('reportContentInner').innerHTML = html;
        var modal = document.getElementById('reportPrintModal');
        if(modal) modal.classList.remove('hidden');
    }

    function printReportContent() {
        var printContents = document.getElementById('printableReportArea').innerHTML;
        var originalContents = document.body.innerHTML;

        // สลับให้แสดงเฉพาะตัวรายงาน
        document.body.innerHTML = `
            <div style="padding: 20px; font-family: 'Prompt', sans-serif; background: white;">
                ${printContents}
            </div>
        `;
        
        window.print();
        
        // คืนค่าหน้าเว็บกลับมา (รีโหลดเพื่อให้ตัวแปร JS คืนค่าสมบูรณ์)
        window.location.reload();
    }
</script>
