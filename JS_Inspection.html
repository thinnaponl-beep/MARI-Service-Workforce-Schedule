<!-- ======================================= -->
<!-- [PAGE COMPONENT]: INSPECTION (ตารางแผนและการเข้าตรวจงาน) -->
<!-- ======================================= -->

<div id="view-inspection" class="view-container hidden flex-grow flex-col overflow-hidden bg-[#f0f4f8]">
    <div class="bg-white px-6 py-3 flex flex-wrap items-center justify-between shrink-0 border-b border-gray-200 shadow-sm gap-4">
        <div class="flex items-center gap-3">
            <button onclick="changeInspectionMonth(-1)" class="w-8 h-8 flex items-center justify-center bg-gray-100 text-gray-600 rounded hover:bg-brand hover:text-white transition"><i class="fa-solid fa-chevron-left text-xs"></i></button>
            <input type="month" id="inspectionMonthPicker" onchange="setInspectionMonthFromPicker(this.value)" class="border border-gray-300 rounded px-3 py-1.5 text-sm font-bold text-brand outline-none focus:border-brand">
            <button onclick="changeInspectionMonth(1)" class="w-8 h-8 flex items-center justify-center bg-gray-100 text-gray-600 rounded hover:bg-brand hover:text-white transition"><i class="fa-solid fa-chevron-right text-xs"></i></button>
        </div>
        
        <!-- 💡 แก้ไขปุ่มรีเฟรช ให้เรียกใช้ฟังก์ชันดึงข้อมูลที่ถูกต้อง -->
        <button onclick="if(typeof applyUserRoleAndStart === 'function') applyUserRoleAndStart()" class="px-4 py-2 bg-gray-50 text-gray-600 border border-gray-200 rounded-lg text-[12px] font-bold hover:bg-white transition flex items-center gap-2">
            <i class="fa-solid fa-arrows-rotate"></i> อัปเดตข้อมูลล่าสุด
        </button>
    </div>
    
    <div class="bg-white px-6 py-2 border-b border-gray-200 flex flex-wrap gap-4 text-[10px] font-bold shrink-0 uppercase tracking-wide">
        <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-orange-400 rounded-sm shadow-sm"></div> วันเริ่มสัญญา</div>
        <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-red-500 rounded-sm shadow-sm"></div> วันสิ้นสุดสัญญา</div>
        <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-green-500 rounded-sm shadow-sm"></div> กิจกรรม AE</div>
        <div class="flex items-center gap-1.5"><div class="w-4 h-4 text-brand flex items-center justify-center"><i class="fa-solid fa-file-circle-check text-sm"></i></div> มีรายงานตรวจงาน (จากมือถือ)</div>
        <div class="flex items-center gap-1.5"><div class="w-3 h-3 border border-gray-300 bg-white flex items-center justify-center text-[9px] font-black">2</div> จำนวนพนักงานในกะ</div>
    </div>

    <div class="flex-grow overflow-auto bg-white custom-scrollbar p-4" id="inspectionTableContainer">
    </div>
</div>

<!-- MODAL บันทึกกิจกรรม AE (Manual) -->
<div id="inspectionModalOverlay" class="fixed inset-0 bg-gray-900/60 z-[99999] hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col transform scale-100 transition-transform duration-200 border border-gray-100">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-brandLight/30">
            <h3 class="text-md font-black text-brand"><i class="fa-solid fa-list-check mr-2"></i> บันทึกกิจกรรม AE</h3>
            <button onclick="document.getElementById('inspectionModalOverlay').classList.add('hidden')" class="text-gray-400 hover:text-gray-800"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="p-6 flex flex-col gap-4">
            <input type="hidden" id="inspActId">
            <input type="hidden" id="inspClientId">
            <input type="hidden" id="inspDate">
            <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                <p class="text-[12px] text-gray-500 font-medium mb-1">ลูกค้า: <span class="font-bold text-gray-800" id="inspClientNameDisplay">-</span></p>
                <p class="text-[12px] text-gray-500 font-medium">วันที่: <span class="font-bold text-brand" id="inspDateDisplay">-</span></p>
            </div>
            <div>
                <label class="block text-[12px] font-bold text-gray-600 mb-1">ประเภทกิจกรรม</label>
                <select id="inspType" class="w-full border border-gray-300 rounded-md px-3 py-2.5 text-sm font-medium outline-none focus:border-brand">
                    <option value="">-- ไม่ระบุ / ลบกิจกรรม --</option>
                    <option value="Inspection">🟢 เข้าตรวจสอบคุณภาพงาน</option>
                    <option value="Report">🔵 วันส่งรายงาน</option>
                    <option value="OJT">🟣 วัน OJT</option>
                    <option value="Payment">🌸 ทำเรื่องเบิกค่าจ้าง</option>
                </select>
            </div>
            <div>
                <label class="block text-[12px] font-bold text-gray-600 mb-1">หมายเหตุ</label>
                <textarea id="inspRemark" rows="3" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-medium outline-none focus:border-brand" placeholder="ระบุรายละเอียดเพิ่มเติม..."></textarea>
            </div>
        </div>
        <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 bg-gray-50/50">
            <button onclick="document.getElementById('inspectionModalOverlay').classList.add('hidden')" class="px-5 py-2.5 bg-white border border-gray-300 text-gray-600 rounded-md text-sm font-bold hover:bg-gray-50 transition">ยกเลิก</button>
            <button onclick="saveInspectionActivity()" class="px-6 py-2.5 bg-brand text-white rounded-md text-sm font-bold hover:bg-brandDark shadow-sm transition">บันทึกข้อมูล</button>
        </div>
    </div>
</div>

<script>
    // 💡 1. จัดการเรื่องวันที่และ Month Picker
    var savedInspDateStr = localStorage.getItem('mari_inspection_date');
    var currentInspectionDate = savedInspDateStr ? new Date(savedInspDateStr) : new Date();

    function initInspectionView() {
        var monthPicker = document.getElementById('inspectionMonthPicker');
        if(monthPicker) {
            var yyyy = currentInspectionDate.getFullYear();
            var mm = String(currentInspectionDate.getMonth() + 1).padStart(2, '0');
            monthPicker.value = yyyy + '-' + mm;
        }
        renderInspectionMatrix();
    }

    function changeInspectionMonth(offset) {
        currentInspectionDate.setMonth(currentInspectionDate.getMonth() + offset);
        localStorage.setItem('mari_inspection_date', currentInspectionDate.toISOString());
        initInspectionView();
    }

    function setInspectionMonthFromPicker(val) {
        if(!val) return;
        var parts = val.split('-');
        currentInspectionDate = new Date(parts[0], parseInt(parts[1]) - 1, 1);
        localStorage.setItem('mari_inspection_date', currentInspectionDate.toISOString());
        renderInspectionMatrix();
    }

    function formatThaiDateShort(dateStr) {
        if(!dateStr) return '-';
        var d = new Date(dateStr);
        if(isNaN(d.getTime())) return '-';
        var months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
        var year = (d.getFullYear() + 543).toString().slice(-2);
        return d.getDate() + ' ' + months[d.getMonth()] + ' ' + year;
    }

    // 💡 2. วาดตาราง Matrix หลัก
    function renderInspectionMatrix() {
        var container = document.getElementById('inspectionTableContainer');
        if(!container) return;

        var yyyy = currentInspectionDate.getFullYear();
        var mm = currentInspectionDate.getMonth();
        var daysInMonth = new Date(yyyy, mm + 1, 0).getDate();
        
        var monthNamesFull = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        var headerMonthText = monthNamesFull[mm] + ' ' + (yyyy + 543); 

        var html = '<table class="w-full border-collapse text-center text-[11px] min-w-[1800px] border border-gray-300 shadow-sm">';
        html += '<thead><tr class="bg-brandDark text-white">';
        html += '<th rowspan="2" class="border border-white/20 p-3 sticky left-0 z-20 bg-brandDark w-56 font-bold text-[13px]">ไซต์งาน</th>';
        html += '<th rowspan="2" class="border border-white/20 p-2 w-32 font-medium bg-brand/90">วันเข้าบริการ</th>';
        html += '<th rowspan="2" class="border border-white/20 p-2 w-32 font-medium bg-brand/90">ความถี่ / เดือน</th>';
        html += '<th rowspan="2" class="border border-white/20 p-2 w-28 font-medium bg-brand/90">วันที่เริ่มสัญญา</th>';
        html += '<th rowspan="2" class="border border-white/20 p-2 w-28 font-medium bg-brand/90">วันที่สิ้นสุด</th>';
        html += '<th colspan="' + daysInMonth + '" class="border border-white/20 p-2 bg-brandDark text-[14px] font-black tracking-widest">' + headerMonthText + '</th>';
        html += '</tr><tr class="bg-gray-100">';

        for(var d=1; d<=daysInMonth; d++) {
            var dateObj = new Date(yyyy, mm, d);
            var dayNames = ['อา','จ','อ','พ','พฤ','ศ','ส'];
            var isWeekend = (dateObj.getDay() === 0 || dateObj.getDay() === 6);
            var bgHead = isWeekend ? 'bg-red-50 text-red-500' : 'bg-gray-50 text-gray-700';
            html += '<th class="border border-gray-300 p-1 w-10 ' + bgHead + '"><div class="font-normal text-[9px]">' + dayNames[dateObj.getDay()] + '</div><div class="font-bold">' + String(d).padStart(2,'0') + '</div></th>';
        }
        html += '</tr></thead><tbody>';

        MOCK_CLIENTS.forEach(function(client) {
            if(client.type === 'system') return;
            var cStart = client.startDate ? new Date(client.startDate) : null;
            var cEnd = client.endDate ? new Date(client.endDate) : null;
            var clientBgColor = (client.color) ? client.color + '20' : '#f3f4f6';

            html += '<tr class="hover:bg-gray-50/50 transition-colors">';
            html += '<td class="border border-gray-200 p-3 sticky left-0 z-10 text-left font-bold text-gray-800 truncate shadow-sm" style="background-color: white; border-left: 5px solid ' + (client.color || '#3d5a6c') + ';">' + client.name + '</td>';
            html += '<td class="border border-gray-200 p-2 text-gray-600 bg-white font-medium">' + (client.serviceDays || '-') + '</td>';
            html += '<td class="border border-gray-200 p-2 text-gray-600 bg-white font-medium">' + (client.frequency || '-') + '</td>';
            html += '<td class="border border-gray-200 p-2 text-gray-500 bg-white">' + (client.startDate ? formatThaiDateShort(client.startDate) : '-') + '</td>';
            html += '<td class="border border-gray-200 p-2 text-gray-500 bg-white">' + (client.endDate ? formatThaiDateShort(client.endDate) : '-') + '</td>';

            for(var d=1; d<=daysInMonth; d++) {
                var cellDateStr = yyyy + '-' + String(mm+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
                var bgColorClass = 'bg-white';
                var iconHtml = '';
                var textHtml = '';

                // เช็ควันเริ่ม/สิ้นสุดสัญญา
                if(cStart && formatDateString(cStart) === cellDateStr) bgColorClass = 'bg-orange-400';
                if(cEnd && formatDateString(cEnd) === cellDateStr) bgColorClass = 'bg-red-500';

                // 💡 เช็ครายงานตรวจงานจริง (จาก MOCK_INSPECTIONS)
                var realReport = MOCK_INSPECTIONS ? MOCK_INSPECTIONS.find(ins => ins.client_id === client.id && ins.date === cellDateStr) : null;
                if (realReport) {
                    var scoreColor = realReport.quality_score === 'ดีมาก' ? 'text-emerald-600' : 'text-brand';
                    iconHtml = '<button onclick="openFullInspectionReport(\'' + realReport.inspection_id + '\')" class="' + scoreColor + ' hover:scale-125 transition-transform drop-shadow-sm" title="คลิกเพื่อดูรายงานฉบับเต็มจาก AE"><i class="fa-solid fa-file-circle-check text-lg"></i></button>';
                }

                // เช็คกิจกรรม AE ที่แอดมินบันทึกมือ
                var act = MOCK_SITE_ACTIVITIES.find(a => a.clientId === client.id && a.date === cellDateStr);
                if(act) {
                    if(act.type === 'Inspection') bgColorClass = 'bg-green-500';
                    else if(act.type === 'Report') bgColorClass = 'bg-blue-500';
                    else if(act.type === 'OJT') bgColorClass = 'bg-purple-400';
                    else if(act.type === 'Payment') bgColorClass = 'bg-pink-300';
                }

                // เช็คจำนวนคนในกะ
                var shifts = MOCK_SHIFTS.filter(s => s.clientId === client.id && s.date === cellDateStr && s.status !== 'cancelled');
                var workers = 0; shifts.forEach(s => { if(s.hks) workers += s.hks.length; });
                if(workers > 0) textHtml = '<span class="font-black text-[12px] ' + (bgColorClass !== 'bg-white' ? 'text-white' : 'text-gray-400') + '">' + workers + '</span>';

                html += '<td class="border border-gray-200 relative p-0" onclick="openInspectionActivityModal(\'' + client.id + '\', \'' + cellDateStr + '\')">';
                html += '<div class="w-full h-full min-h-[42px] flex flex-col items-center justify-center gap-0.5 ' + bgColorClass + '">';
                html += iconHtml ? iconHtml : textHtml;
                html += '</div></td>';
            }
            html += '</tr>';
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // 💡 3. ระบบแสดงรายงานตรวจงานฉบับเต็ม (AE Report Viewer)
    function openFullInspectionReport(insId) {
        if (event) event.stopPropagation();
        
        // 💡 ค้นหาใน MOCK_INSPECTIONS ที่ถูกต้อง
        var report = MOCK_INSPECTIONS.find(i => i.inspection_id === insId);
        if(!report) return;

        var client = MOCK_CLIENTS.find(c => c.id === report.client_id) || { name: report.client_id };
        var inspector = MOCK_HOUSEKEEPERS.find(h => h.id === report.ae_id) || { name: report.ae_id };

        var reportContent = `
            <div class="flex flex-col gap-6 text-gray-800">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-brandLight/50 p-4 rounded-xl border border-brand/10 text-center shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">ผลประเมินคุณภาพ</p>
                        <p class="text-lg font-black text-brand">${report.quality_score}</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 text-center shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">ผู้ตรวจงาน (AE)</p>
                        <p class="text-sm font-bold text-gray-700">${inspector.name}</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 text-center shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">วันที่เข้าตรวจ</p>
                        <p class="text-sm font-bold text-gray-700">${report.date}</p>
                    </div>
                </div>

                <div>
                    <h4 class="text-sm font-black text-brand mb-3 border-l-4 border-brand pl-2 uppercase tracking-wide">1. จุดตรวจความสะอาด (Checklist)</h4>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        ${renderChecklistGrid(report.checklist_data)}
                    </div>
                </div>

                <div>
                    <h4 class="text-sm font-black text-orange-500 mb-3 border-l-4 border-orange-500 pl-2 uppercase tracking-wide">2. ปัญหาที่พบและการแก้ไข (Issues)</h4>
                    <div class="flex flex-col gap-3">
                        ${renderIssuesGrid(report.issues_data)}
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                    <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">3. สัมภาษณ์พนักงาน / หมายเหตุเพิ่มเติม</h4>
                    <p class="text-[13px] font-medium italic text-gray-600">"${report.interview_note || '-'}"</p>
                </div>

                <div class="flex flex-col items-end mt-4 pr-4">
                    <div class="text-center">
                        <div class="w-40 h-16 border-b border-gray-300 mb-2 flex items-center justify-center overflow-hidden">
                            ${report.signature_url ? `<img src="${report.signature_url}" class="max-h-full max-w-full">` : '<span class="text-gray-300 text-xs italic">ไม่มีลายเซ็น</span>'}
                        </div>
                        <p class="text-[11px] font-bold text-gray-800">ลงชื่อผู้ตรวจงาน</p>
                    </div>
                </div>
            </div>
        `;

        showCustomDialog({
            title: 'รายงานการตรวจงาน: ' + client.name,
            message: reportContent,
            type: 'info',
            buttons: [{ text: 'ปิดหน้ารายงาน', style: 'cancel' }]
        });
        
        var box = document.getElementById('customDialogBox');
        if(box) box.style.maxWidth = '850px';
    }

    function renderChecklistGrid(data) {
        if(!data) return '<p class="text-xs text-gray-400 italic">ไม่มีข้อมูล</p>';
        try {
            var items = JSON.parse(data);
            return items.map(item => `
                <div class="flex flex-col gap-1 text-center">
                    <div class="aspect-square rounded-lg border border-gray-100 bg-gray-50 overflow-hidden cursor-pointer hover:opacity-80 transition shadow-sm" onclick="previewImage('${item.imgUrl}', '${item.name}')">
                        <img src="${item.imgUrl}" class="w-full h-full object-cover">
                    </div>
                    <span class="text-[10px] font-bold text-gray-600 truncate px-1">${item.name}</span>
                    <span class="text-[9px] font-black ${item.status === 'passed' ? 'text-green-500' : 'text-red-500'} uppercase">${item.status}</span>
                </div>
            `).join('');
        } catch(e) { return '-'; }
    }

    function renderIssuesGrid(data) {
        if(!data || data === '[]') return '<div class="p-4 text-center text-gray-400 text-xs bg-gray-50 rounded-xl border border-gray-100 italic shadow-sm">ไม่พบปัญหาในรอบการตรวจนี้</div>';
        try {
            var issues = JSON.parse(data);
            return issues.map((issue, idx) => `
                <div class="bg-orange-50/40 border border-orange-100 rounded-xl p-4 flex flex-col gap-3 text-left shadow-sm">
                    <div class="flex items-center gap-2">
                        <span class="bg-orange-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full">ปัญหาที่ ${idx+1}</span>
                        <p class="text-[13px] font-bold text-gray-800">${issue.desc}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">สภาพก่อนแก้ไข (Before)</p>
                            <img src="${issue.beforeUrl}" class="w-full h-32 object-cover rounded-lg border border-gray-200 cursor-pointer shadow-sm" onclick="previewImage('${issue.beforeUrl}', 'ก่อนแก้ไข')">
                        </div>
                        <div class="text-orange-300"><i class="fa-solid fa-chevron-right text-lg"></i></div>
                        <div class="flex-1">
                            <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">หลังแก้ไข (After)</p>
                            ${issue.afterUrl ? `<img src="${issue.afterUrl}" class="w-full h-32 object-cover rounded-lg border border-green-200 cursor-pointer shadow-sm" onclick="previewImage('${issue.afterUrl}', 'แก้ไขแล้ว')">` : '<div class="w-full h-32 flex items-center justify-center bg-white/50 rounded-lg border border-dashed border-gray-300 text-gray-400 text-[10px] italic">รอดำเนินการแก้ไข</div>'}
                        </div>
                    </div>
                    ${issue.actionDesc ? `<div class="bg-white p-2.5 rounded-lg border border-orange-100 text-[11px] text-gray-600 font-medium mt-1"><b>วิธีแก้ไข:</b> ${issue.actionDesc}</div>` : ''}
                </div>
            `).join('');
        } catch(e) { return '-'; }
    }

    // ฟังก์ชันสำหรับบันทึกกิจกรรมด้วยมือ (Manual) คงเดิม
    function openInspectionActivityModal(clientId, dateStr) {
        var isAdmin = (CURRENT_USER && (CURRENT_USER.role === 'Admin / Supervisor' || CURRENT_USER.role === 'Admin' || CURRENT_USER.role === 'DEV'));
        if (!isAdmin && CURRENT_USER && CURRENT_USER.role === 'Viewer') return;

        var existingAct = MOCK_SITE_ACTIVITIES.find(a => a.clientId === clientId && a.date === dateStr);
        var client = MOCK_CLIENTS.find(x => x.id === clientId);

        document.getElementById('inspActId').value = existingAct ? existingAct.id : '';
        document.getElementById('inspClientId').value = clientId;
        document.getElementById('inspDate').value = dateStr;
        document.getElementById('inspClientNameDisplay').innerText = client ? client.name : clientId;
        document.getElementById('inspDateDisplay').innerText = dateStr;
        document.getElementById('inspType').value = existingAct ? existingAct.type : '';
        document.getElementById('inspRemark').value = existingAct ? (existingAct.remark || '') : '';

        document.getElementById('inspectionModalOverlay').classList.remove('hidden');
    }

    function saveInspectionActivity() {
        var data = {
            id: document.getElementById('inspActId').value || 'ACT-' + new Date().getTime(),
            clientId: document.getElementById('inspClientId').value,
            date: document.getElementById('inspDate').value,
            type: document.getElementById('inspType').value,
            remark: document.getElementById('inspRemark').value,
            actionBy: CURRENT_USER ? CURRENT_USER.email : 'Unknown'
        };

        if(data.type === '') {
            MOCK_SITE_ACTIVITIES = MOCK_SITE_ACTIVITIES.filter(a => !(a.clientId === data.clientId && a.date === data.date));
        } else {
            var idx = MOCK_SITE_ACTIVITIES.findIndex(a => a.id === data.id);
            if(idx > -1) MOCK_SITE_ACTIVITIES[idx] = data; else MOCK_SITE_ACTIVITIES.push(data);
        }

        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run.saveSiteActivityToBackend(data, data.type === '');
        }
        
        document.getElementById('inspectionModalOverlay').classList.add('hidden');
        renderInspectionMatrix(); 
        if(typeof showToast === 'function') showToast('บันทึกกิจกรรมเรียบร้อยแล้ว');
    }
</script>
