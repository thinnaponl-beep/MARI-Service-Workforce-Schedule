<!-- ======================================= -->
<!-- [PAGE COMPONENT]: ATTENDANCE (เวลาเข้า-ออก) -->
<!-- ======================================= -->

<div id="view-attendance" class="view-container hidden flex-grow flex-col overflow-hidden bg-[#f0f4f8]">
    
    <!-- 💡 ส่วนหัว: ตัวกรองข้อมูล (Filter) -->
    <div class="bg-white px-6 py-4 border-b border-gray-200 flex flex-col md:flex-row md:items-end justify-between shrink-0 gap-4 shadow-sm z-10">
        <div class="flex flex-wrap items-end gap-4 w-full md:w-auto">
            <div>
                <label class="block text-[11px] font-bold text-gray-500 mb-1">ตั้งแต่วันที่</label>
                <input type="date" id="attFilterStartDate" onchange="renderAttendanceTable()" class="border border-gray-300 rounded-md px-3 py-1.5 text-[12px] focus:border-brand outline-none bg-gray-50 focus:bg-white shadow-sm transition">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-gray-500 mb-1">ถึงวันที่</label>
                <input type="date" id="attFilterEndDate" onchange="renderAttendanceTable()" class="border border-gray-300 rounded-md px-3 py-1.5 text-[12px] focus:border-brand outline-none bg-gray-50 focus:bg-white shadow-sm transition">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-gray-500 mb-1">ไซต์งาน (Client)</label>
                <select id="attFilterClient" onchange="renderAttendanceTable()" class="border border-gray-300 rounded-md px-3 py-1.5 text-[12px] focus:border-brand outline-none min-w-[200px] bg-gray-50 focus:bg-white shadow-sm transition">
                    <option value="all">-- ทุกไซต์งาน --</option>
                </select>
            </div>
        </div>
        <div class="relative w-full md:w-64 shrink-0">
            <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-[12px]"></i>
            <input type="text" id="attSearchInput" onkeyup="renderAttendanceTable()" placeholder="ค้นหาชื่อพนักงาน..." class="w-full pl-8 pr-3 py-1.5 border border-gray-300 rounded-full text-[12px] focus:border-brand outline-none transition shadow-sm bg-gray-50 focus:bg-white">
        </div>
    </div>

    <!-- 💡 ตารางแสดงผลข้อมูล -->
    <div class="flex-grow overflow-auto p-6 custom-scrollbar">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full data-table text-[13px]">
                <thead>
                    <tr>
                        <th class="w-[10%] text-center">วันที่</th>
                        <th class="w-[20%]">พนักงาน</th>
                        <th class="w-[20%]">ไซต์งาน / กะเวลา</th>
                        <th class="w-[20%] text-center">เช็คอิน (Check-in)</th>
                        <th class="w-[20%] text-center">เช็คเอาท์ (Check-out)</th>
                        <th class="w-[10%] text-center">สถานะ</th>
                    </tr>
                </thead>
                <tbody id="attendanceTableBody">
                    <!-- ข้อมูลจะถูกดึงมาแสดงตรงนี้ -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 💡 Full-screen Image Preview Overlay (ส่วนขยายรูปภาพแบบเต็มจอ) -->
<div id="attendanceImagePreviewOverlay" class="fixed inset-0 bg-black/95 z-[999999] hidden flex items-center justify-center transition-opacity opacity-0" onclick="if(event.target === this) closeAttendanceImagePreview()">
    <button onclick="closeAttendanceImagePreview()" class="absolute top-6 right-6 w-12 h-12 flex items-center justify-center text-white/70 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors cursor-pointer z-10">
        <i class="fa-solid fa-xmark text-2xl"></i>
    </button>
    <div class="flex flex-col items-center pointer-events-none">
        <img id="attendanceImagePreviewTarget" src="" class="max-w-[95vw] max-h-[85vh] object-contain rounded-lg shadow-2xl transform scale-95 transition-transform duration-300 pointer-events-auto">
        <p id="attendanceImagePreviewLabel" class="mt-4 text-white/90 text-[13px] font-medium tracking-wide bg-black/50 px-4 py-2 rounded-full hidden"></p>
    </div>
</div>

<script>
    function initAttendanceView() {
        var today = new Date();
        document.getElementById('attFilterStartDate').value = formatDateString(today);
        document.getElementById('attFilterEndDate').value = formatDateString(today);

        var clientSelect = document.getElementById('attFilterClient');
        if (clientSelect) {
            clientSelect.innerHTML = '<option value="all">-- ทุกไซต์งาน --</option>';
            MOCK_CLIENTS.forEach(function(c) {
                if (c.type !== 'system') {
                    var opt = document.createElement('option');
                    opt.value = c.id;
                    opt.text = c.name;
                    clientSelect.appendChild(opt);
                }
            });
        }
        renderAttendanceTable();
    }

    function renderAttendanceTable() {
        var tbody = document.getElementById('attendanceTableBody');
        if (!tbody) return;

        var startDateStr = document.getElementById('attFilterStartDate').value;
        var endDateStr = document.getElementById('attFilterEndDate').value;
        var filterClient = document.getElementById('attFilterClient').value;
        var keyword = document.getElementById('attSearchInput').value.toLowerCase();

        var displayData = MOCK_ATTENDANCE.filter(function(record) {
            if (startDateStr && record.date < startDateStr) return false;
            if (endDateStr && record.date > endDateStr) return false;
            if (filterClient !== 'all' && record.clientId !== filterClient) return false;

            if (keyword) {
                var hk = MOCK_HOUSEKEEPERS.find(h => h.id === record.hkId);
                var hkName = hk ? hk.name.toLowerCase() : '';
                if (!hkName.includes(keyword) && !record.hkId.toLowerCase().includes(keyword)) return false;
            }
            return true;
        });

        // เรียงลำดับจากวันที่ล่าสุด -> เก่าสุด 
        displayData.sort(function(a, b) {
            if (a.date !== b.date) return new Date(b.date) - new Date(a.date);
            var tA = a.checkInTime ? a.checkInTime : '00:00';
            var tB = b.checkInTime ? b.checkInTime : '00:00';
            return tB.localeCompare(tA);
        });

        var html = '';
        var now = new Date();
        var todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        var currentTimeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

        // ฟังก์ชันช่วยจัดรูปแบบเวลาให้มั่นใจว่าเป็น HH:mm เสมอ
        var formatTime = function(t) {
            if (!t) return null;
            if (typeof t === 'string') {
                if (t.includes('T')) {
                    var dt = new Date(t);
                    if (!isNaN(dt.getTime())) return String(dt.getHours()).padStart(2, '0') + ':' + String(dt.getMinutes()).padStart(2, '0');
                }
                if (t.includes(':')) {
                    var parts = t.split(':');
                    return parts[0].padStart(2, '0') + ':' + parts[1].padStart(2, '0');
                }
            }
            if (t instanceof Date) return String(t.getHours()).padStart(2, '0') + ':' + String(t.getMinutes()).padStart(2, '0');
            return null;
        };

        displayData.forEach(function(record) {
            var hk = MOCK_HOUSEKEEPERS.find(h => h.id === record.hkId) || { name: 'ไม่พบข้อมูล', nickname: '-' };
            var client = MOCK_CLIENTS.find(c => c.id === record.clientId) || { name: 'ไม่พบข้อมูล' };
            var shift = MOCK_SHIFTS.find(s => s.id === record.shiftId) || { start: '-', end: '-' };

            var dateObj = new Date(record.date);
            var dateStr = String(dateObj.getDate()).padStart(2, '0') + '-' + String(dateObj.getMonth() + 1).padStart(2, '0') + '-' + dateObj.getFullYear();

            var checkInTime = formatTime(record.checkInTime);
            var checkOutTime = formatTime(record.checkOutTime);
            
            var displayCheckIn = checkInTime ? checkInTime + ' น.' : '-';
            var displayCheckOut = checkOutTime ? checkOutTime + ' น.' : '-';

            // 💡 1. คำนวณ "เข้างานสาย"
            var isLateCheckIn = false;
            if (checkInTime && shift.start && shift.start !== '-') {
                var sStartFormat = formatTime(shift.start) || shift.start;
                if (checkInTime > sStartFormat) isLateCheckIn = true;
            }

            // 💡 2. คำนวณ "ลืมเช็คเอาท์"
            var isForgotCheckOut = false;
            if (checkInTime && !checkOutTime) { // ถ้าเช็คอินแล้วแต่ยังไม่เช็คเอาท์
                if (record.date < todayStr) {
                    isForgotCheckOut = true; // ถ้าเป็นของวันก่อนหน้า
                } else if (record.date === todayStr && shift.end && shift.end !== '-') {
                    var sEndFormat = formatTime(shift.end) || shift.end;
                    if (currentTimeStr > sEndFormat) isForgotCheckOut = true; // ถ้าเวลาปัจจุบันเลยเวลาเลิกงานแล้ว
                }
            }

            var buildImageElement = function(imgUrl, label) {
                if (!imgUrl || imgUrl === '-' || imgUrl === '') {
                    return '<div class="w-12 h-12 bg-gray-50 rounded-lg border border-gray-200 flex items-center justify-center text-gray-400 shrink-0" title="ไม่มีรูปภาพ"><i class="fa-solid fa-camera text-[12px]"></i></div>';
                }
                return '<div class="relative inline-block cursor-pointer transform hover:scale-110 transition-all duration-200 shrink-0" onclick="openAttendanceImagePreview(\'' + imgUrl + '\', \'' + label + '\')" title="คลิกเพื่อขยายรูปภาพ">' +
                       '<img src="' + imgUrl + '" class="w-12 h-12 rounded-lg object-cover shadow-sm border border-gray-200 bg-white">' +
                       '<div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity rounded-lg">' +
                       '<i class="fa-solid fa-magnifying-glass-plus text-white text-xs"></i>' +
                       '</div></div>';
            };

            var inImg = buildImageElement(record.checkInImg, 'รูปสถานที่ตอนเช็คอิน (' + hk.name + ')');
            var outSiteImg = buildImageElement(record.checkOutSiteImg, 'รูปสถานที่ก่อนเลิกงาน (' + hk.name + ')');
            var outDocImg = buildImageElement(record.checkOutDocImg, 'รูปเอกสารใบงาน (' + hk.name + ')');

            var gpsPin = '';
            if (record.checkInLat && record.checkInLng) {
                gpsPin = '<a href="https://www.google.com/maps/search/?api=1&query=' + record.checkInLat + ',' + record.checkInLng + '" target="_blank" class="text-[10px] text-blue-500 hover:text-blue-700 hover:underline mt-1 inline-block"><i class="fa-solid fa-location-dot"></i> ดูพิกัด (Map)</a>';
            }

            // แสดงส่วนเช็คอิน พร้อมป้ายเข้างานสาย
            var lateTag = isLateCheckIn ? '<div class="mt-1"><span class="text-[10px] text-red-500 font-bold bg-red-50 px-2 py-0.5 rounded border border-red-100 whitespace-nowrap">เข้างานสาย</span></div>' : '';
            var inHtml = '<div class="flex flex-col items-center justify-center">' + 
                            '<div class="flex items-center justify-center gap-2">' + inImg + '<span class="font-bold text-green-600 bg-green-50 px-2 py-1 rounded border border-green-100 whitespace-nowrap">' + displayCheckIn + '</span></div>' + 
                            lateTag + gpsPin + 
                         '</div>';

            // แสดงส่วนเช็คเอาท์ พร้อมการลืมเช็คเอาท์
            var outHtml = '';
            if (checkOutTime) {
                outHtml = '<div class="flex items-center justify-center gap-3"><div class="flex gap-1.5">' + outSiteImg + outDocImg + '</div><span class="font-bold text-[#3d5a6c] bg-blue-50 px-2 py-1 rounded border border-blue-100 whitespace-nowrap">' + displayCheckOut + '</span></div>';
            } else if (isForgotCheckOut) {
                outHtml = '<span class="px-2 py-1 bg-red-50 text-red-500 rounded border border-red-100 text-[11px] font-bold whitespace-nowrap">ลืมเช็คเอาท์</span>';
            } else {
                outHtml = '<span class="text-[11px] text-gray-400 italic">- ยังไม่เลิกงาน -</span>';
            }

            // 💡 3. แก้บั๊กสถานะหลังสุด: ควบคุมสถานะรวมจากเวลาที่พบ
            var statusBadge = '';
            if (checkOutTime) {
                statusBadge = '<span class="px-2.5 py-1 bg-green-100 text-green-700 rounded-md text-[11px] font-bold block whitespace-nowrap"><i class="fa-solid fa-check-double mr-1"></i> สมบูรณ์</span>';
            } else if (isForgotCheckOut) {
                statusBadge = '<span class="px-2.5 py-1 bg-red-100 text-red-600 rounded-md text-[11px] font-bold block whitespace-nowrap"><i class="fa-solid fa-triangle-exclamation mr-1"></i> ลืมเช็คเอาท์</span>';
            } else {
                statusBadge = '<span class="px-2.5 py-1 bg-orange-100 text-orange-600 rounded-md text-[11px] font-bold block whitespace-nowrap"><i class="fa-solid fa-person-digging mr-1"></i> กำลังทำงาน</span>';
            }

            var hkAvatar = hk.avatar || 'https://ui-avatars.com/api/?name=U';
            var hkColorBorder = 'border: 2px solid ' + (hk.color || '#e5e7eb') + '; padding: 1px; background: white;';
            
            html += '<tr class="hover:bg-gray-50/50 transition-colors border-b border-gray-100">';
            html += '<td class="text-center font-bold text-gray-700">' + dateStr + '</td>';
            html += '<td><div class="flex items-center gap-3"><img src="' + hkAvatar + '" class="w-10 h-10 rounded-full object-cover shadow-sm" style="' + hkColorBorder + '"><div class="flex flex-col"><span class="font-bold text-gray-900">' + hk.name + '</span><span class="text-[10px] font-medium text-gray-500">' + record.hkId + '</span></div></div></td>';
            html += '<td><div class="font-bold text-brand truncate max-w-[200px]" title="' + client.name + '">' + client.name + '</div><div class="text-[11px] font-medium text-gray-500 mt-0.5"><i class="fa-regular fa-clock mr-1"></i> ' + shift.start + ' - ' + shift.end + '</div></td>';
            html += '<td class="text-center py-3">' + inHtml + '</td>';
            html += '<td class="text-center py-3">' + outHtml + '</td>';
            html += '<td class="text-center">' + statusBadge + '</td>';
            html += '</tr>';
        });

        if (!html) {
            html = '<tr><td colspan="6" class="text-center py-16 text-gray-400 italic text-[13px]">- ไม่พบข้อมูลการลงเวลาในช่วงนี้ -</td></tr>';
        }
        tbody.innerHTML = html;
    }

    // 💡 ฟังก์ชันเปิดรูปภาพแบบเต็มหน้าจอ
    function openAttendanceImagePreview(url, label) {
        var overlay = document.getElementById('attendanceImagePreviewOverlay');
        var imgTarget = document.getElementById('attendanceImagePreviewTarget');
        var lblTarget = document.getElementById('attendanceImagePreviewLabel');
        
        imgTarget.src = url;
        if (label) {
            lblTarget.innerText = label;
            lblTarget.classList.remove('hidden');
        } else {
            lblTarget.classList.add('hidden');
        }
        
        overlay.classList.remove('hidden');
        void overlay.offsetWidth; // Trigger reflow
        overlay.classList.remove('opacity-0');
        imgTarget.classList.remove('scale-95');
        imgTarget.classList.add('scale-100');
    }

    // 💡 ฟังก์ชันปิดรูปภาพ
    function closeAttendanceImagePreview() {
        var overlay = document.getElementById('attendanceImagePreviewOverlay');
        var imgTarget = document.getElementById('attendanceImagePreviewTarget');
        
        overlay.classList.add('opacity-0');
        imgTarget.classList.remove('scale-100');
        imgTarget.classList.add('scale-95');
        
        setTimeout(function() {
            overlay.classList.add('hidden');
            imgTarget.src = '';
        }, 300);
    }
</script>
