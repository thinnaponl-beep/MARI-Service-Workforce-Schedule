    // --- 0. Utility Functions ---
    function getStartOfWeek(date) {
        var d = new Date(date);
        d.setHours(0, 0, 0, 0);
        var day = d.getDay();
        var diff = d.getDate() - day + (day === 0 ? -6 : 1); 
        return new Date(d.setDate(diff));
    }

    function formatDateString(date) {
        if (!date) return '';
        var d = new Date(date),
            month = '' + (d.getMonth() + 1),
            day = '' + d.getDate(),
            year = d.getFullYear();
        if (month.length < 2) month = '0' + month;
        if (day.length < 2) day = '0' + day;
        return [year, month, day].join('-');
    }

    function getRandomColor() {
        var colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f43f5e'];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    // 💡 อัปเดต: ฟังก์ชัน Preview รูปภาพแบบเต็มหน้าจอ (Full-screen Overlay) สวยงาม
    function previewImage(url, title) {
        if (!url || url === '-' || url === '') return;
        var overlay = document.getElementById('globalImagePreviewOverlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'globalImagePreviewOverlay';
            overlay.className = 'fixed inset-0 bg-black/95 z-[999999] hidden flex flex-col items-center justify-center transition-opacity opacity-0';
            overlay.innerHTML = `
                <button onclick="document.getElementById('globalImagePreviewOverlay').classList.add('opacity-0'); setTimeout(function(){document.getElementById('globalImagePreviewOverlay').classList.add('hidden');}, 300);" class="absolute top-6 right-6 w-12 h-12 flex items-center justify-center text-white/70 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors cursor-pointer z-10">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
                <img id="globalImagePreviewTarget" src="" class="max-w-[95vw] max-h-[85vh] object-contain rounded-lg shadow-2xl transform transition-transform duration-300">
                <p id="globalImagePreviewLabel" class="mt-4 text-white/90 text-[14px] font-bold tracking-wide bg-black/50 px-4 py-2 rounded-full hidden"></p>
            `;
            document.body.appendChild(overlay);
        }
        var imgTarget = document.getElementById('globalImagePreviewTarget');
        var lblTarget = document.getElementById('globalImagePreviewLabel');
        
        imgTarget.src = url;
        if (title) {
            lblTarget.innerText = title;
            lblTarget.classList.remove('hidden');
        } else {
            lblTarget.classList.add('hidden');
        }
        
        overlay.classList.remove('hidden');
        void overlay.offsetWidth; // Trigger reflow
        overlay.classList.remove('opacity-0');
    }

    var MOCK_HOUSEKEEPERS = [];
    var MOCK_SHIFTS = [];
    var MOCK_USERS = []; 
    var MOCK_ISSUES = []; 
    var MOCK_SITE_ACTIVITIES = []; 
    var MOCK_NOTIFICATIONS = []; 
    var MOCK_ATTENDANCE = [];

    // --- 2. ระบบเช็ค Login ---
    function checkLogin() {
        var todayStr = new Date().toDateString(); 
        var cachedLoginDate = localStorage.getItem('mari_login_date');
        var cachedUserData = localStorage.getItem('mari_user_data');

        if (cachedLoginDate === todayStr && cachedUserData) {
            try {
                CURRENT_USER = JSON.parse(cachedUserData);
                applyUserRoleAndStart(); 
            } catch(e) { showLoginScreen(); }
        } else {
            showLoginScreen();
        }
    }

    function showLoginScreen() {
        var loginScreen = document.getElementById('loginScreen');
        if (loginScreen) {
            loginScreen.classList.remove('hidden');
            loginScreen.style.display = 'flex';
        }
        var loadingOverlay = document.getElementById('loadingOverlay');
        if (loadingOverlay) {
            loadingOverlay.style.opacity = '0';
            setTimeout(function() { loadingOverlay.style.display = 'none'; }, 300);
        }
    }

    function resetLoginButton() {
        var btnLogin = document.getElementById('btnLogin');
        if (btnLogin) {
            btnLogin.innerHTML = '<div class="bg-white p-1.5 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform"><svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg></div> ลงชื่อเข้าใช้ด้วยบัญชี Google';
            btnLogin.disabled = false;
        }
    }

    function verifyWithBackend() {
        var loginScreen = document.getElementById('loginScreen');
        var errorMsg = document.getElementById('loginErrorMsg');
        var errorText = document.getElementById('loginErrorText');
        var btnLogin = document.getElementById('btnLogin');
        
        if (errorMsg) errorMsg.classList.add('hidden');
        if (btnLogin) {
            btnLogin.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังตรวจสอบสิทธิ์...';
            btnLogin.disabled = true;
        }

        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run
                .withSuccessHandler(function(res) {
                    if (res.status === 'success') {
                        CURRENT_USER = res.user;
                        localStorage.setItem('mari_login_date', new Date().toDateString());
                        localStorage.setItem('mari_user_data', JSON.stringify(CURRENT_USER));
                        
                        if (loginScreen) loginScreen.style.display = 'none';
                        var overlay = document.getElementById('loadingOverlay');
                        if (overlay) { overlay.style.display = 'flex'; overlay.style.opacity = '1'; }
                        
                        applyUserRoleAndStart();
                    } else {
                        resetLoginButton();
                        if (errorMsg) errorMsg.classList.remove('hidden');
                        if (errorText) errorText.innerText = res.message;
                        showLoginScreen(); 
                    }
                })
                .withFailureHandler(function(err) {
                    resetLoginButton();
                    if (errorMsg) errorMsg.classList.remove('hidden');
                    if (errorText) errorText.innerText = 'เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว กรุณาลองใหม่';
                    showLoginScreen();
                })
                .verifyUserLogin();
        } else {
            CURRENT_USER = { email: 'test@mariservices.com', name: 'Test Admin', role: 'Admin / Supervisor' };
            if (loginScreen) loginScreen.style.display = 'none';
            var overlay = document.getElementById('loadingOverlay');
            if (overlay) { overlay.style.display = 'flex'; overlay.style.opacity = '1'; }
            applyUserRoleAndStart();
        }
    }

    function applyUserRoleAndStart() {
        var nameEl = document.getElementById('currentUserName');
        var roleEl = document.getElementById('currentUserRole');
        var sideNameEl = document.getElementById('sidebarUserName');
        var sideRoleEl = document.getElementById('sidebarUserRole');

        if (nameEl) nameEl.innerText = CURRENT_USER.name;
        if (roleEl) roleEl.innerText = CURRENT_USER.role;
        if (sideNameEl) sideNameEl.innerText = CURRENT_USER.name;
        if (sideRoleEl) sideRoleEl.innerText = CURRENT_USER.role;

        var avatarUrl = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(CURRENT_USER.name) + '&background=3d5a6c&color=fff';
        var avTop = document.getElementById('currentUserAvatar');
        var avSide = document.getElementById('sidebarUserAvatar');
        if (avTop) avTop.src = avatarUrl;
        if (avSide) avSide.src = avatarUrl;

        var menuDatabase = document.getElementById('menu-manage');
        var menuSystem = document.getElementById('menu-users');

        if (CURRENT_USER.role === 'Viewer') {
            if(menuDatabase) menuDatabase.style.display = 'none';
            if(menuSystem) menuSystem.style.display = 'none';
        } else if (CURRENT_USER.role === 'AE/หัวหน้าแม่บ้าน' || CURRENT_USER.role === 'Supervisor') {
            if(menuDatabase) menuDatabase.style.display = 'flex';
            if(menuSystem) menuSystem.style.display = 'none';
            var systemHeader = document.querySelector('#menu-section-system p');
            if (systemHeader) systemHeader.style.display = 'none';
        } else {
            if(menuDatabase) menuDatabase.style.display = 'flex';
            if(menuSystem) menuSystem.style.display = 'flex';
            var systemHeader = document.querySelector('#menu-section-system p');
            if (systemHeader) systemHeader.style.display = 'block';
        }

        if(typeof initSearchableDropdowns === 'function') initSearchableDropdowns(); 
        if(typeof initPhoneValidation === 'function') initPhoneValidation(); 
        if(typeof loadThaiAddressData === 'function') loadThaiAddressData(); 
        if(typeof initAddressListeners === 'function') initAddressListeners();
        
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run
                .withSuccessHandler(function(response) {
                    processBackendData(response);
                    switchMainView('view-schedule', 'menu-schedule');
                    hideLoading();
                })
                .withFailureHandler(function(error) {
                    console.error("Backend Error:", error);
                    useFallbackMockData();
                    switchMainView('view-schedule', 'menu-schedule');
                    hideLoading();
                })
                .getAppData();
        } else {
            useFallbackMockData();
            switchMainView('view-schedule', 'menu-schedule');
            setTimeout(hideLoading, 500);
        }
    }

    function logout() {
        if(typeof showCustomDialog === 'function') {
            showCustomDialog({
                title: 'ยืนยันการออกจากระบบ',
                message: 'คุณต้องการออกจากระบบ MARI Services ใช่หรือไม่?',
                type: 'warning',
                buttons: [
                    { text: 'ยกเลิก', style: 'cancel' },
                    { text: 'ออกจากระบบ', style: 'danger', action: processLogout }
                ]
            });
        } else {
            if(confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) processLogout();
        }
    }

    function processLogout() {
        localStorage.removeItem('mari_login_date');
        localStorage.removeItem('mari_user_data');
        CURRENT_USER = null;

        document.querySelectorAll('.view-container').forEach(function(el) { 
            el.classList.add('hidden'); 
            el.classList.remove('flex', 'active'); 
        });

        resetLoginButton();
        var errorMsg = document.getElementById('loginErrorMsg');
        if (errorMsg) errorMsg.classList.add('hidden');

        showLoginScreen();
    }

    function initPhoneValidation() {
        var phoneInput = document.getElementById('staffPhone');
        if (phoneInput) {
            phoneInput.setAttribute('maxlength', '10');
            phoneInput.addEventListener('input', function(e) {
                this.value = this.value.replace(/[^0-9]/g, '');

    function toggleSidebar() {
        var sidebar = document.getElementById('mainSidebar');
        if(sidebar) {
            if(window.innerWidth < 1024) {
                sidebar.classList.toggle('mobile-open');
            } else {
                sidebar.classList.toggle('collapsed');
                
                var isCollapsed = sidebar.classList.contains('collapsed');
                var logoLarge = sidebar.querySelector('.logo-large');
                var logoSmall = sidebar.querySelector('.logo-small');
                
                if (isCollapsed) {
                    if(logoLarge) logoLarge.style.display = 'none';
                    if(logoSmall) { 
                        logoSmall.classList.remove('hidden'); 
                        logoSmall.style.display = 'flex'; 
                    }
                } else {
                    if(logoLarge) logoLarge.style.display = 'block';
                    if(logoSmall) { 
                        logoSmall.classList.add('hidden'); 
                        logoSmall.style.display = 'none'; 
                    }
                }
            }
        }
    }

    function switchMainView(viewId, menuId) {
        document.querySelectorAll('.sidebar-menu').forEach(function(el) {
            el.className = "sidebar-menu flex items-center gap-3 px-3 py-3 rounded-xl text-[14px] font-medium text-gray-500 hover:text-brand hover:bg-gray-50 transition-all";
        });
        var activeMenu = document.getElementById(menuId);
        if(activeMenu) {
            activeMenu.className = "sidebar-menu flex items-center gap-3 px-3 py-3 rounded-xl text-[14px] font-bold transition-all text-brand bg-brandLight";
            
            if(menuId === 'menu-attendance') {

        document.querySelectorAll('.view-container').forEach(function(el) {

                else if (viewId === 'view-issues') titleEl.innerHTML = 'แจ้งปัญหาคุณภาพ (Issues)';
                else if (viewId === 'view-evaluation') titleEl.innerHTML = 'คะแนนประเมินลูกค้า (CSI)'; 
                else if (viewId === 'view-manage') titleEl.innerHTML = 'ข้อมูลหลัก (Manage Data)';
                else if (viewId === 'view-users') titleEl.innerHTML = 'ตั้งค่าสิทธิ์ (Users)';

    function loadThaiAddressData() {
        var cachedData = localStorage.getItem('mari_thai_address_sheet_v1');
        if (cachedData) {
            try {
                thaiAddressData = JSON.parse(cachedData);
                populateProvinceDropdown();
                return;
            } catch(e) {}
        }

        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run
                .withSuccessHandler(function(flatData) {
                    if (flatData && flatData.length > 0) { buildAddressTree(flatData); }
                })
                .getAddressDataFromSheet(); 
        }
    }

    function buildAddressTree(flatData) {
        var tree = {};
        flatData.forEach(function(item) {
            var prov = item.ProvinceThai; var amp = item.DistrictThai; var tam = item.TambonThai; var zip = item.postCode;
            if (!prov || !amp) return; 
            if (!tree[prov]) tree[prov] = {};
            if (!tree[prov][amp]) tree[prov][amp] = [];
            if (tam) { tree[prov][amp].push({ name_th: tam, zip_code: zip }); }
        });

        thaiAddressData = Object.keys(tree).sort().map(function(provName) {
            return {
                name_th: provName,
                amphure: Object.keys(tree[provName]).sort().map(function(ampName) {
                    return { name_th: ampName, tambon: tree[provName][ampName].sort(function(a,b) { return a.name_th.localeCompare(b.name_th); }) };
                })
            };
        });
        localStorage.setItem('mari_thai_address_sheet_v1', JSON.stringify(thaiAddressData));
        populateProvinceDropdown();
    }

    function populateProvinceDropdown() {
        var selProv = document.getElementById('clientProvince');
        if (!selProv) return;
        selProv.innerHTML = '<option value="">-- เลือกจังหวัด --</option>';
        thaiAddressData.forEach(function(p) {
            var opt = document.createElement('option');
            opt.value = p.name_th; opt.text = p.name_th;
            selProv.appendChild(opt);
        });
        if (window.jQuery && $.fn.select2) $('#clientProvince').trigger('change.select2');
    }

    function initAddressListeners() {
        var elClientProv = document.getElementById('clientProvince');
        if(elClientProv) {
            elClientProv.addEventListener('change', function(e) {
                var provName = e.target.value;
                var prov = thaiAddressData.find(function(p) { return p.name_th === provName; });
                var selDist = document.getElementById('clientDistrict');
                var selTam = document.getElementById('clientTambon');
                
                if (selDist) selDist.innerHTML = '<option value="">-- เลือกอำเภอ/เขต --</option>';
                if (selTam) selTam.innerHTML = '<option value="">-- เลือกตำบล/แขวง --</option>';
                setInputValue('clientZipcode', '');

                if (prov && selDist) {
                    prov.amphure.forEach(function(a) {
                        var opt = document.createElement('option'); opt.value = a.name_th; opt.text = a.name_th; selDist.appendChild(opt);
                    });
                }
                if (window.jQuery && $.fn.select2) { $('#clientDistrict').trigger('change.select2'); $('#clientTambon').trigger('change.select2'); }
            });
        }

        var elClientDist = document.getElementById('clientDistrict');
        if(elClientDist) {
            elClientDist.addEventListener('change', function(e) {
                var provName = document.getElementById('clientProvince').value;
                var distName = e.target.value;
                var prov = thaiAddressData.find(function(p) { return p.name_th === provName; });
                var selTam = document.getElementById('clientTambon');
                
                if (selTam) selTam.innerHTML = '<option value="">-- เลือกตำบล/แขวง --</option>';
                setInputValue('clientZipcode', '');

                if (prov && selTam) {
                    var dist = prov.amphure.find(function(a) { return a.name_th === distName; });
                    if (dist && dist.tambon) {
                        dist.tambon.forEach(function(t) {
                            var opt = document.createElement('option'); opt.value = t.name_th; opt.text = t.name_th; selTam.appendChild(opt);
                        });
                    }
                }
                if (window.jQuery && $.fn.select2) { $('#clientTambon').trigger('change.select2'); }
            });
        }

        var elClientTam = document.getElementById('clientTambon');
        if(elClientTam) {
            elClientTam.addEventListener('change', function(e) {
                var provName = document.getElementById('clientProvince').value;
                var distName = document.getElementById('clientDistrict').value;
                var tamName = e.target.value;

                var prov = thaiAddressData.find(function(p) { return p.name_th === provName; });
                if (prov) {
                    var dist = prov.amphure.find(function(a) { return a.name_th === distName; });
                    if (dist && dist.tambon) {
                        var tam = dist.tambon.find(function(t) { return t.name_th === tamName; });
                        if (tam && tam.zip_code) { setInputValue('clientZipcode', tam.zip_code); }
                    }
                }
            });
        }
    }

    // 💡 ฟังก์ชันใหม่: ดึงข้อมูลอย่างปลอดภัย แม้ชื่อหัวคอลัมน์จาก DB จะเปลี่ยนเป็นตัวพิมพ์ใหญ่-เล็ก หรือมีช่องว่าง
    function safeGet(obj, keys) {
        if(!obj) return '';
        // 1. หาแบบตรงตัวเป๊ะๆ ก่อน
        for(var i=0; i<keys.length; i++) {
            if(obj[keys[i]] !== undefined && obj[keys[i]] !== null && obj[keys[i]] !== '') return obj[keys[i]];
        }
        // 2. ถ้าไม่เจอ ให้ค้นหาแบบแปลงตัวเล็กทั้งหมด และตัดช่องว่างทิ้ง
        for(var k in obj) {
            for(var j=0; j<keys.length; j++) {
                if(k.toLowerCase().trim() === keys[j].toLowerCase().trim() && obj[k] !== undefined && obj[k] !== null) return obj[k];
            }
        }
        return '';
    }

    // 💡 ฟังก์ชันประมวลผลข้อมูลจาก Backend (สุดยอดระบบ Auto-Normalize Mapping)
    function processBackendData(data) {
        if (!data) { useFallbackMockData(); return; }

        // --- MOCK_CLIENTS ---
        MOCK_CLIENTS = [];
        if (data.clients && data.clients.length > 0) {
            data.clients.forEach(function(c) {
                MOCK_CLIENTS.push({
                    id: safeGet(c, ['client_id', 'id']), 
                    name: safeGet(c, ['client_name', 'name']), 
                    address: safeGet(c, ['address']), 
                    district: safeGet(c, ['district']), 
                    province: safeGet(c, ['province']),
                    type: safeGet(c, ['type']) || 'B2B', 
                    color: safeGet(c, ['color_hex', 'color']) || '#e2e8f0', 
                    reqStaff: safeGet(c, ['required_hk_per_day', 'reqStaff']) || 1,
                    contact: safeGet(c, ['contact_person', 'contact']), 
                    phone: safeGet(c, ['phone']), 
                    status: safeGet(c, ['status']) || 'Active', 
                    contractHours: safeGet(c, ['contract_hours', 'contractHours']) || 0,
                    serviceDays: safeGet(c, ['service_days', 'serviceDays']) || '',
                    frequency: safeGet(c, ['frequency']) || '',
                    startDate: safeGet(c, ['start_date', 'startDate']) || '',
                    endDate: safeGet(c, ['end_date', 'endDate']) || '',
                    lat: safeGet(c, ['lat']) || '', 
                    lng: safeGet(c, ['lng']) || '',
                    checklist: safeGet(c, ['checklist']) || ''
                });
            });
        }
        if(MOCK_CLIENTS.length === 0) MOCK_CLIENTS = [{ id: 'CL-001', name: 'งานรอจัดสรร (Unassigned)', type: 'system', color: '#e2e8f0', reqStaff: 1 }];

        // --- MOCK_HOUSEKEEPERS ---

        if (data.housekeepers && data.housekeepers.length > 0) {
            data.housekeepers.forEach(function(h) {
                var hName = safeGet(h, ['name']) || 'ไม่มีชื่อ';
                var rawAvatar = safeGet(h, ['avatar_url', 'avatar']);
                var validAvatar = (rawAvatar && rawAvatar.trim() !== '') ? rawAvatar : ('https://ui-avatars.com/api/?name=' + encodeURIComponent(hName) + '&background=f0f4f8&color=3d5a6c');
                MOCK_HOUSEKEEPERS.push({
                    id: safeGet(h, ['hk_id', 'id']), 
                    name: hName, 
                    nickname: safeGet(h, ['nickname']) || '-',
                    phone: safeGet(h, ['phone']), 
                    lineId: safeGet(h, ['line_id', 'lineId']), 
                    type: safeGet(h, ['job_type', 'type']) || 'Full-time', 
                    status: safeGet(h, ['status']) || 'Active',
                    skills: safeGet(h, ['special_skills', 'skills']) || '', 
                    zones: safeGet(h, ['zones']) || '', 
                    maxHoursWeek: safeGet(h, ['max_hours_week', 'maxHoursWeek']) || 48,
                    startDate: safeGet(h, ['start_date', 'startDate']) || '', 
                    endDate: safeGet(h, ['end_date', 'endDate']) || '',
                    avatar: validAvatar, 
                    color: safeGet(h, ['color_hex', 'color']) || '#3b82f6',
                    pin: safeGet(h, ['pin']) || ''
                });
            });
        }

        // --- MOCK_SHIFTS ---
        MOCK_SHIFTS = [];
        if (data.shifts && data.shifts.length > 0) {
            data.shifts.forEach(function(s) {
                var rawHk = safeGet(s, ['assigned_hk_ids', 'hks']);
                var hkArray = rawHk ? rawHk.toString().split(',').map(function(id) { return id.trim(); }).filter(function(id) { return id; }) : [];
                MOCK_SHIFTS.push({ 
                    id: safeGet(s, ['shift_id', 'id']), 
                    clientId: safeGet(s, ['client_id', 'clientId']), 
                    date: safeGet(s, ['date']), 
                    start: safeGet(s, ['start_time', 'start']), 
                    end: safeGet(s, ['end_time', 'end']), 
                    hks: hkArray, 
                    status: safeGet(s, ['status']) || 'scheduled', 
                    notes: safeGet(s, ['notes']) || '', 
                    groupId: safeGet(s, ['recurring_group_id', 'groupId']) || '' 
                });
            });
        }
        
        // --- MOCK_USERS ---
        MOCK_USERS = [];
        if (data.users && data.users.length > 0) {
            data.users.forEach(function(u) {
                var rawStatus = safeGet(u, ['is_active', 'status', 'Status', 'สถานะ']);
                var isActive = (rawStatus === true || rawStatus === 'true' || rawStatus === 'Active' || rawStatus === 'เปิดใช้งาน' || rawStatus === 'Yes' || rawStatus === 1) ? 'Active' : 'Inactive';
                MOCK_USERS.push({ 
                    id: safeGet(u, ['email', 'อีเมล']), 
                    name: safeGet(u, ['name', 'ชื่อ']) || 'ไม่มีชื่อ', 
                    email: safeGet(u, ['email', 'อีเมล']), 
                    role: safeGet(u, ['role', 'บทบาท']) || 'Viewer', 
                    status: isActive,
                    phone: safeGet(u, ['phone', 'เบอร์โทร']),
                    pin: safeGet(u, ['pin', 'รหัส'])
                });
            });
        }
        if (MOCK_USERS.length === 0) { MOCK_USERS.push({ id: 'U1', name: 'Admin User', email: 'admin@mariservices.com', role: 'Admin', status: 'Active' }); }

        // --- MOCK_SITE_ACTIVITIES & AE PLANS ---
        MOCK_SITE_ACTIVITIES = [];
        window.MOCK_AE_PLANS = [];
        
        if(data.siteActivities && data.siteActivities.length > 0) {
            data.siteActivities.forEach(function(a) {
                MOCK_SITE_ACTIVITIES.push({
                    id: safeGet(a, ['act_id', 'id']), 
                    clientId: safeGet(a, ['client_id', 'clientId']), 
                    date: safeGet(a, ['date', 'Date']), 
                    type: safeGet(a, ['type', 'Type']), 
                    remark: safeGet(a, ['remark', 'Remark']), 
                    actionBy: safeGet(a, ['action_by', 'actionBy'])
                });
            });
        }
        
        // กู้คืนแผนที่เคยจัดไว้ในตารางใหม่ AE_Plans (ถ้าย้ายกลับมาตารางเดิม)
        if(data.ae_plans && data.ae_plans.length > 0) {
            data.ae_plans.forEach(function(p) {
                MOCK_SITE_ACTIVITIES.push({
                    id: safeGet(p, ['plan_id', 'id']), 
                    clientId: safeGet(p, ['client_id', 'clientId']), 
                    date: safeGet(p, ['plan_date', 'date']), 
                    type: 'Inspection', 
                    remark: safeGet(p, ['notes']) || safeGet(p, ['status']), 
                    actionBy: safeGet(p, ['ae_email', 'aeEmail'])
                });
            });
        }
        window.MOCK_SITE_ACTIVITIES = MOCK_SITE_ACTIVITIES;

        // --- MOCK_ISSUES ---
        MOCK_ISSUES = [];
        if(data.issues && data.issues.length > 0) {
            data.issues.forEach(function(i) {
                MOCK_ISSUES.push({
                    id: safeGet(i, ['issue_id', 'id']), 
                    clientId: safeGet(i, ['client_id', 'clientId']), 
                    dateReported: safeGet(i, ['date_reported', 'dateReported']),
                    source: safeGet(i, ['source']) || 'housekeeper', 
                    providerId: safeGet(i, ['provider_id', 'providerId']) || '',
                    category: safeGet(i, ['category']), 
                    description: safeGet(i, ['description']), 
                    status: safeGet(i, ['status']) || 'Pending',
                    assignedTo: safeGet(i, ['assigned_to', 'assignedTo']) || '', 
                    dueDate: safeGet(i, ['due_date', 'dueDate']) || '', 
                    actionTaken: safeGet(i, ['action_taken', 'actionTaken']) || '', 
                    resolutionNote: safeGet(i, ['resolution_note', 'resolutionNote']) || ''
                });
            });
        }

        // --- MOCK_ATTENDANCE ---
        MOCK_ATTENDANCE = [];
        if(data.attendance && data.attendance.length > 0) {
            data.attendance.forEach(function(a) {
                MOCK_ATTENDANCE.push({
                    id: safeGet(a, ['record_id', 'id']), 
                    shiftId: safeGet(a, ['shift_id', 'shiftId']), 
                    hkId: safeGet(a, ['hk_id', 'hkId']), 
                    clientId: safeGet(a, ['client_id', 'clientId']),
                    date: safeGet(a, ['date']), 
                    checkInTime: safeGet(a, ['check_in_time', 'checkInTime']), 
                    checkInImg: safeGet(a, ['check_in_img', 'checkInImg']),
                    checkInLat: safeGet(a, ['check_in_lat', 'checkInLat']), 
                    checkInLng: safeGet(a, ['check_in_lng', 'checkInLng']),
                    checkOutTime: safeGet(a, ['check_out_time', 'checkOutTime']), 
                    checkOutSiteImg: safeGet(a, ['check_out_site_img', 'checkOutSiteImg']),
                    checkOutDocImg: safeGet(a, ['check_out_doc_img', 'checkOutDocImg']), 
                    status: safeGet(a, ['status'])
                });
            });
        }

        // --- MOCK_INSPECTIONS ---
        MOCK_INSPECTIONS = [];
        if(data.inspections && data.inspections.length > 0) {
            data.inspections.forEach(function(ins) {
                MOCK_INSPECTIONS.push({
                    id: safeGet(ins, ['inspection_id', 'id']), 
                    clientId: safeGet(ins, ['client_id', 'clientId']), 
                    aeId: safeGet(ins, ['ae_id', 'aeId']), 
                    date: safeGet(ins, ['date']),
                    quality: safeGet(ins, ['quality_score', 'quality']), 
                    followUpDate: safeGet(ins, ['follow_up_date', 'followUpDate']), 
                    interviewNote: safeGet(ins, ['interview_note', 'interviewNote']),
                    signatureUrl: safeGet(ins, ['signature_url', 'signatureUrl']), 
                    checklist: safeGet(ins, ['checklist_data', 'checklist']), 
                    issues: safeGet(ins, ['issues_data', 'issues'])
                });
            });
        }
        window.MOCK_INSPECTIONS = MOCK_INSPECTIONS;

        // --- MOCK_EVALUATIONS ---
        MOCK_EVALUATIONS = [];
        if(data.evaluations && data.evaluations.length > 0) {
            data.evaluations.forEach(function(ev) {
                MOCK_EVALUATIONS.push({
                    id: safeGet(ev, ['eval_id', 'id']), 
                    clientId: safeGet(ev, ['client_id', 'clientId']), 
                    month: safeGet(ev, ['eval_month', 'month']), 
                    scores: safeGet(ev, ['hk_scores', 'scores']), 
                    comment: safeGet(ev, ['comment']), 
                    createdAt: safeGet(ev, ['created_at', 'createdAt'])
                });
            });
        }

        MOCK_NOTIFICATIONS = [];

        refreshAllViews();
        renderNotifications(); 
    }

    function useFallbackMockData() {
        MOCK_CLIENTS = [ { id: 'CL-001', name: 'งานรอจัดสรร (Unassigned)', type: 'system', color: '#e2e8f0', reqStaff: 1 } ];
        MOCK_HOUSEKEEPERS = [ { id: 'HK-001', name: 'สมใจ รักสะอาด', nickname: 'ใจ', type: 'Full-time', status: 'Active', phone: '089-123-4567', avatar: 'https://ui-avatars.com/api/?name=' + encodeURIComponent('สมใจ') + '&background=e2e8f0&color=3d5a6c', color: '#ec4899', pin: '1234' } ];
        MOCK_SHIFTS = [];
        MOCK_USERS = [ { id: 'U1', name: 'Admin User', email: 'admin@mariservices.com', role: 'Admin', status: 'Active' } ];
        MOCK_ISSUES = []; 
        MOCK_SITE_ACTIVITIES = []; 
        MOCK_ATTENDANCE = [];
        MOCK_INSPECTIONS = [];
        MOCK_EVALUATIONS = [];
        window.MOCK_AE_PLANS = []; 
        window.MOCK_INSPECTIONS = MOCK_INSPECTIONS;
        window.MOCK_SITE_ACTIVITIES = MOCK_SITE_ACTIVITIES;
        MOCK_NOTIFICATIONS = [];
        
        refreshAllViews();
        renderNotifications(); 
    }

    // --- 💡 ระบบแจ้งเตือน (Notifications) ---
    function toggleNotificationDropdown(e) {
        if(e) e.stopPropagation();
        var dropdown = document.getElementById('notiDropdown');
        if (dropdown.classList.contains('invisible')) {
            dropdown.classList.remove('invisible', 'opacity-0');
            dropdown.classList.add('opacity-100');
        } else {
            dropdown.classList.add('invisible', 'opacity-0');
            dropdown.classList.remove('opacity-100');
        }
    }

    function addSystemNotification(title, message, type, linkId) {
        var noti = {
            id: 'NOTI-' + new Date().getTime(),
            title: title,
            message: message,
            type: type, 
            isRead: false,
            linkId: linkId,
            timestamp: new Date()
        };
        MOCK_NOTIFICATIONS.unshift(noti); 
        renderNotifications();
        showToast('การแจ้งเตือน: ' + title);
    }

    function markAllNotificationsRead(e) {
        if(e) e.stopPropagation();
        MOCK_NOTIFICATIONS.forEach(function(n) { n.isRead = true; });
        renderNotifications();
    }

    function handleNotiClick(notiId, type, linkId) {
        var noti = MOCK_NOTIFICATIONS.find(function(n) { return n.id === notiId; });
        if(noti) noti.isRead = true;
        renderNotifications();
        
        var dropdown = document.getElementById('notiDropdown');
        if(dropdown) dropdown.classList.add('invisible', 'opacity-0');

        if (type && type.includes('Issue') && typeof switchMainView === 'function') {
            switchMainView('view-issues', 'menu-issues');
            if (linkId && typeof editIssue === 'function') {
                setTimeout(function() { editIssue(linkId); }, 300);
            }
        }
    }

    function renderNotifications() {
        var container = document.getElementById('notiListContainer');
        var badge = document.getElementById('notiBadge');
        if(!container || !badge) return;

        var unreadCount = MOCK_NOTIFICATIONS.filter(function(n) { return !n.isRead; }).length;
        if(unreadCount > 0) {
            badge.innerText = unreadCount > 9 ? '9+' : unreadCount;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }

        if(MOCK_NOTIFICATIONS.length === 0) {
            container.innerHTML = '<div class="px-4 py-8 text-center text-gray-400 text-[12px] italic">ไม่มีการแจ้งเตือน</div>';
            return;
        }

        var html = '';
        MOCK_NOTIFICATIONS.forEach(function(n) {
            var bgClass = n.isRead ? 'bg-white' : 'bg-blue-50/40';
            var iconHtml = '<div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center shrink-0"><i class="fa-solid fa-bell text-[12px]"></i></div>';
            
            if(n.type === 'IssueAssigned') iconHtml = '<div class="w-8 h-8 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center shrink-0"><i class="fa-solid fa-user-check text-[12px]"></i></div>';
            else if(n.type === 'IssueRejected') iconHtml = '<div class="w-8 h-8 rounded-full bg-red-100 text-red-600 flex items-center justify-center shrink-0"><i class="fa-solid fa-xmark text-[12px]"></i></div>';
            else if(n.type === 'IssueResolved') iconHtml = '<div class="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center shrink-0"><i class="fa-solid fa-check-double text-[12px]"></i></div>';
            else if(n.type === 'IssueNew') iconHtml = '<div class="w-8 h-8 rounded-full bg-cyan-100 text-cyan-600 flex items-center justify-center shrink-0"><i class="fa-solid fa-sparkles text-[12px]"></i></div>';

            var timeStr = n.timestamp.getHours().toString().padStart(2,'0') + ':' + n.timestamp.getMinutes().toString().padStart(2,'0');

            html += '<div onclick="handleNotiClick(\'' + n.id + '\', \'' + n.type + '\', \'' + n.linkId + '\')" class="px-4 py-3 border-b border-gray-50 flex items-start gap-3 cursor-pointer hover:bg-gray-50 transition ' + bgClass + '">' +
                        iconHtml +
                        '<div class="flex flex-col flex-1 min-w-0">' +
                            '<span class="text-[12px] font-bold text-gray-800 leading-tight">' + n.title + '</span>' +
                            '<span class="text-[11px] text-gray-500 mt-0.5 line-clamp-2 leading-snug">' + n.message + '</span>' +
                            '<span class="text-[9px] text-gray-400 mt-1"><i class="fa-regular fa-clock"></i> ' + timeStr + '</span>' +
                        '</div>' +
                    '</div>';
        });
        container.innerHTML = html;
    }

    document.addEventListener('click', function(e) {
        var dropdown = document.getElementById('notiDropdown');
        if (dropdown && !dropdown.classList.contains('invisible')) {
            if (!dropdown.contains(e.target) && !e.target.closest('[onclick="toggleNotificationDropdown(event)"]')) {
                dropdown.classList.add('invisible', 'opacity-0');
            }
        }
    });

    function refreshAllViews() {
        if(typeof initModalForms === 'function') initModalForms();
        if(typeof filterGridData === 'function') filterGridData(); 
        if(typeof renderStaffTable === 'function') renderStaffTable();
        if(typeof renderClientTable === 'function') renderClientTable();
        if(typeof renderUserTable === 'function') renderUserTable();
        
        if(typeof initIssuesView === 'function') initIssuesView();
        if(typeof renderIssuesTable === 'function') renderIssuesTable(); 

        if(typeof renderInspectionMatrix === 'function') renderInspectionMatrix();
        if(typeof renderAttendanceTable === 'function') renderAttendanceTable();
        
        if(typeof renderEvaluations === 'function') renderEvaluations(); 
    }

    function closeModal(id) { 
        var modal = document.getElementById(id);
        if (modal) modal.classList.add('hidden'); 
    }
</script>
